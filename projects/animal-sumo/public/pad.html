<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Animal Sumo — 手柄</title>
<style>
  :root { --ink:#3a2a17; --cream:#f6e8c8; --accent:#ffcf33; --danger:#ff4d4d; --ok:#4caf50; }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; color:var(--cream); overflow:hidden;
    font-family:-apple-system,"Segoe UI",system-ui,sans-serif; touch-action:none;
    background:#28200f url(/assets/ui/bg-stadium.png) center/cover fixed; }
  body::before { content:""; position:fixed; inset:0; background:rgba(26,20,10,.72); z-index:0; }
  #app { height:100%; display:flex; flex-direction:column; position:relative; z-index:1; }
  #top { padding:14px 18px; display:flex; align-items:center; justify-content:space-between;
    background:linear-gradient(180deg, rgba(58,42,23,.95), rgba(58,42,23,.6));
    border-bottom:2px solid rgba(255,207,51,.4); }
  #top .badge { font-weight:800; letter-spacing:.05em; color:var(--accent); font-size:18px; }
  #top .state { font-size:12px; letter-spacing:.12em; text-transform:uppercase; opacity:.85; }
  #play { flex:1; position:relative; }
  /* left analog stick */
  #stickBase { position:absolute; left:6%; bottom:12%; width:44vw; height:44vw; max-width:230px; max-height:230px;
    border-radius:50%; background:rgba(58,42,23,.5); border:3px solid rgba(255,207,51,.35);
    box-shadow:inset 0 4px 20px rgba(0,0,0,.5); }
  #stickThumb { position:absolute; left:50%; top:50%; width:40%; height:40%; margin:-20% 0 0 -20%;
    border-radius:50%; background:radial-gradient(circle at 40% 35%, #ffe07a, #d9a520);
    border:2px solid #8a6a3a; box-shadow:0 6px 18px rgba(0,0,0,.5); }
  /* dash button */
  #dash { position:absolute; right:7%; bottom:15%; width:32vw; height:32vw; max-width:170px; max-height:170px;
    border-radius:50%; background:radial-gradient(circle at 40% 35%, #ff7a3d, #c23415);
    color:#fff; font-weight:900; font-size:6vw; display:flex; align-items:center; justify-content:center;
    border:3px solid #8a3a1a; box-shadow:0 10px 26px rgba(194,52,21,.6); text-shadow:0 2px 4px rgba(0,0,0,.5); }
  #dash.cool { filter:grayscale(.7) brightness(.55); }
  #dash.charging { animation:chg .5s ease-in-out infinite alternate; }
  @keyframes chg { from { transform:scale(1); box-shadow:0 10px 26px rgba(194,52,21,.6); }
    to { transform:scale(1.08); box-shadow:0 0 30px 8px rgba(255,180,60,.85); } }
  #overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:14px; text-align:center; padding:30px;
    background:rgba(26,20,10,.94); z-index:5; }
  #overlay h2 { font-size:24px; color:var(--accent); } #overlay p { opacity:.8; font-size:14px; }
  #nameForm { display:flex; flex-direction:column; gap:14px; width:100%; max-width:320px; }
  #nameForm input { padding:14px; border-radius:12px; border:2px solid #8a6a3a;
    background:#f6e8c8; color:#3a2a17; font-size:18px; text-align:center; font-weight:600; }
  #nameForm button { padding:15px; border-radius:12px; border:2px solid #8a6a3a;
    background:radial-gradient(circle at 50% 30%, #ffe07a, #d9a520);
    color:#3a2a17; font-weight:900; font-size:18px; letter-spacing:.05em; }
  .hidden { display:none !important; }
</style>
</head>
<body>
<div id="app">
  <div id="top">
    <span class="badge" id="who">—</span>
    <span class="state" id="state">连接中</span>
  </div>
  <div id="play">
    <div id="stickBase"><div id="stickThumb"></div></div>
    <div id="dash">冲刺</div>
    <div id="overlay">
      <form id="nameForm">
        <h2>🐾 加入擂台</h2>
        <p>起个名字，扫码入场把对手挤下台</p>
        <input id="nameInput" placeholder="你的名字" maxlength="12" autocomplete="off" />
        <button type="submit">加入</button>
      </form>
    </div>
  </div>
</div>
<script type="module" src="/pad.js"></script>
</body>
</html>

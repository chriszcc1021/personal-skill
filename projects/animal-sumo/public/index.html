<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>Animal Sumo — 大屏</title>
<script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
<style>
  :root { --ink:#3a2a17; --cream:#f6e8c8; --gold:#ffcf33; --danger:#ff4d4d; --ok:#4caf50; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { height:100%; overflow:hidden; color:var(--cream);
    font-family:-apple-system,"Segoe UI",system-ui,sans-serif; }
  body { background:#1a2233; }
  #wrap { display:flex; height:100%; }
  #stage { flex:1; position:relative; display:flex; align-items:center; justify-content:center; }
  canvas { max-width:100%; max-height:100%; }
  /* wood-sign logo sits top-centre over the pitch */
  #logoWrap { position:absolute; top:0.5vh; left:50%; transform:translateX(-50%);
    width:min(18vw,230px); z-index:3; pointer-events:none;
    filter:drop-shadow(0 6px 16px rgba(0,0,0,.5)); }
  #logo { width:100%; display:block; }
  #logoText { position:absolute; top:44%; left:50%; transform:translate(-50%,-50%) rotate(-1.5deg);
    text-align:center; width:76%; }
  #logoText .t1 { display:block; font-size:clamp(18px,2vw,30px); font-weight:900; color:#5a3a18;
    letter-spacing:.04em; text-transform:uppercase; line-height:1; text-shadow:0 1px 0 rgba(255,255,255,.3); }
  #logoText .t2 { display:block; font-size:clamp(11px,1.1vw,15px); font-weight:800; color:#7a5a2a;
    letter-spacing:.24em; margin-top:2px; }
  #side { width:300px; padding:20px 18px; display:flex; flex-direction:column; gap:16px;
    background:linear-gradient(180deg, rgba(58,42,23,.92), rgba(40,28,15,.95));
    border-left:3px solid rgba(255,207,51,.35); box-shadow:inset 0 0 40px rgba(0,0,0,.4); }
  /* parchment card */
  .card { position:relative; padding:16px 16px 18px;
    background:#f6e8c8; color:#3a2a17; border-radius:12px;
    border:2px solid #8a6a3a; box-shadow:0 6px 16px rgba(0,0,0,.4);
    background-image:radial-gradient(rgba(138,106,58,.10) 1px, transparent 1px);
    background-size:8px 8px; }
  .card h2 { font-size:12px; letter-spacing:.14em; text-transform:uppercase;
    color:#6a4a22; margin-bottom:10px; text-align:center;
    border-bottom:1px dashed #b89a66; padding-bottom:6px; }
  #qr { background:#fff; padding:8px; border-radius:8px; width:fit-content; margin:0 auto;
    border:2px solid #8a6a3a; }
  #joinUrl { font-size:10px; word-break:break-all; opacity:.7; margin-top:8px; text-align:center; color:#6a4a22; }
  #players { display:flex; flex-direction:column; gap:7px; }
  .prow { display:flex; align-items:center; gap:9px; font-size:15px; font-weight:600; color:#3a2a17; }
  .prow .dot { width:11px; height:11px; border-radius:50%; background:var(--ok); flex:none;
    box-shadow:0 0 0 2px rgba(76,175,80,.25); }
  .prow.dead { opacity:.4; text-decoration:line-through; }
  .prow.dead .dot { background:var(--danger); box-shadow:none; }
  .empty-slot { color:#b89a66; font-style:italic; font-size:13px; }
  #pcount { color:#6a4a22; }
  /* centre banner over the arena */
  #banner { position:absolute; top:0; left:0; right:0; text-align:center; padding-top:16vh;
    pointer-events:none; z-index:2; }
  #bannerBig { font-size:8vw; font-weight:900; color:var(--gold); letter-spacing:.02em;
    text-shadow:0 4px 0 #8a6a3a, 0 8px 26px rgba(0,0,0,.7); -webkit-text-stroke:2px #4a3418; }
  #bannerSub { font-size:2vw; margin-top:1vh; color:#fff; font-weight:700;
    text-shadow:0 2px 8px rgba(0,0,0,.8); }
  .hidden { display:none !important; }
  #soundHint { position:absolute; bottom:12px; left:50%; transform:translateX(-50%);
    font-size:13px; font-weight:700; background:radial-gradient(circle at 50% 30%, #ffe07a, #d9a520);
    color:#3a2a17; padding:8px 18px; border-radius:20px; border:2px solid #8a6a3a; cursor:pointer; z-index:4;
    box-shadow:0 4px 12px rgba(0,0,0,.4); }
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <div id="logoWrap">
      <img id="logo" src="/assets/ui/wood-sign-title.png" alt="Animal Sumo" />
      <div id="logoText"><span class="t1">Animal Sumo</span><span class="t2">擂台争霸</span></div>
    </div>
    <canvas id="cv" width="900" height="900"></canvas>
    <div id="banner" class="hidden">
      <div id="bannerBig"></div>
      <div id="bannerSub"></div>
    </div>
    <div id="soundHint">🔊 点击开启音效</div>
  </div>
  <div id="side">
    <div class="card">
      <h2>扫码加入 / Scan to join</h2>
      <div id="qr"></div>
      <div id="joinUrl"></div>
    </div>
    <div class="card">
      <h2>选手 / Players (<span id="pcount">0</span>/8)</h2>
      <div id="players"></div>
    </div>
  </div>
</div>
<script type="module" src="/screen.js"></script>
</body>
</html>

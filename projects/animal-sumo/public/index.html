<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>Animal Sumo — 大屏</title>
<script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
<style>
  :root { --bg:#0d1117; --ink:#e6edf3; --accent:#ffcf33; --danger:#ff4d4d; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { height:100%; background:radial-gradient(circle at 50% 30%, #182233, #0d1117 70%); color:var(--ink);
    font-family:-apple-system,"Segoe UI",system-ui,sans-serif; overflow:hidden; }
  #wrap { display:flex; height:100%; }
  #stage { flex:1; position:relative; display:flex; align-items:center; justify-content:center; }
  canvas { max-width:100%; max-height:100%; }
  #side { width:280px; padding:22px; display:flex; flex-direction:column; gap:18px;
    background:rgba(0,0,0,.28); border-left:1px solid rgba(255,255,255,.08); }
  h1 { font-size:22px; letter-spacing:.08em; text-transform:uppercase; }
  h1 span { color:var(--accent); }
  .card { background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08);
    border-radius:14px; padding:16px; }
  .card h2 { font-size:12px; letter-spacing:.14em; text-transform:uppercase; opacity:.7; margin-bottom:10px; }
  #qr { background:#fff; padding:10px; border-radius:10px; width:fit-content; margin:0 auto; }
  #joinUrl { font-size:11px; word-break:break-all; opacity:.6; margin-top:8px; text-align:center; }
  #players { display:flex; flex-direction:column; gap:8px; }
  .prow { display:flex; align-items:center; gap:10px; font-size:14px; }
  .prow .dot { width:10px; height:10px; border-radius:50%; background:#3fb950; }
  .prow.dead { opacity:.4; }
  .prow.dead .dot { background:var(--danger); }
  #banner { position:absolute; top:0; left:0; right:0; text-align:center; padding-top:6vh;
    pointer-events:none; }
  #bannerBig { font-size:9vw; font-weight:800; letter-spacing:.02em;
    text-shadow:0 6px 30px rgba(0,0,0,.6); }
  #bannerSub { font-size:2.2vw; opacity:.85; margin-top:1vh; }
  .hidden { display:none !important; }
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="cv" width="820" height="820"></canvas>
    <div id="banner" class="hidden">
      <div id="bannerBig"></div>
      <div id="bannerSub"></div>
    </div>
  </div>
  <div id="side">
    <h1>Animal <span>Sumo</span></h1>
    <div class="card">
      <h2>扫码加入 / Scan to join</h2>
      <div id="qr"></div>
      <div id="joinUrl"></div>
    </div>
    <div class="card">
      <h2>选手 / Players (<span id="pcount">0</span>/8)</h2>
      <div id="players"></div>
    </div>
  </div>
</div>
<script type="module" src="/screen.js"></script>
</body>
</html>

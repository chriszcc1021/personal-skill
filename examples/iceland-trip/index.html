<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冰岛环岛 11 天自驾路书</title>
<meta name="description" content="2026年9月冰岛环岛11天自驾路书，含黄金圈、南岸、斯奈山、冰川徒步全攻略">
<meta property="og:title" content="冰岛环岛 11 天自驾路书">
<meta property="og:description" content="2026.9.21-10.1 / 4人环岛自驾 / 极光+冰川+瀑布">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇮🇸</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<style>
:root {
  --bg: #08090a;
  --bg-surface: #111214;
  --bg-surface-hover: #181a1e;
  --text-primary: #E8EDF2;
  --text-secondary: #6B7B8F;
  --text-dim: #5A6A7E;
  --accent: #4ECDC4;
  --accent-dim: rgba(78,205,196,0.15);
  --accent-glow: rgba(78,205,196,0.3);
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.15);
  --ghost-bg: rgba(255,255,255,0.04);
  --ghost-border: rgba(255,255,255,0.12);
  --risk-low: #4ECDC4;
  --risk-mid: #F5C542;
  --risk-high: #FF6B6B;
  --xiaohongshu: #ff2442;
  --font-display: 'Barlow Condensed', 'Arial Narrow', sans-serif;
  --font-body: 'Inter', -apple-system, sans-serif;
  --tl-drive: #6B7B8F;
  --tl-spot: #4ECDC4;
  --tl-activity: #F5C542;
  --tl-meal: #6B7B8F;
  --tl-stay: #4A5568;
  --tl-aurora: #B388FF;
  --tl-hike: #FF9E44;
  --tl-free: #6B7B8F;
  --tl-rest: #6B7B8F;
  --tl-flight: #6B7B8F;
  --tl-walk: #4ECDC4;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text-primary);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  height: 100vh;
  height: 100dvh;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

/* ====== LAYOUT ====== */
.app {
  display: flex;
  width: 100%;
  height: 100vh;
  height: 100dvh;
  padding-bottom: 56px;
}

.map-pane {
  position: fixed;
  top: 0;
  left: 0;
  width: 60%;
  height: calc(100vh - 56px);
  height: calc(100dvh - 56px);
  z-index: 1;
}
#map { width: 100%; height: 100%; }

.content-pane {
  position: fixed;
  top: 0;
  right: 0;
  width: 40%;
  height: calc(100vh - 56px);
  height: calc(100dvh - 56px);
  overflow-y: auto;
  overflow-x: hidden;
  background: var(--bg);
  z-index: 2;
  border-left: 1px solid var(--border);
}

/* ====== BOTTOM NAV ====== */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 56px;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 0 12px;
  background: rgba(8,9,10,0.9);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-top: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
}
.bottom-nav::-webkit-scrollbar { display: none; }
.bottom-nav::before,
.bottom-nav::after {
  content: '';
  position: absolute;
  top: 0;
  bottom: 0;
  width: 28px;
  pointer-events: none;
  z-index: 101;
}
.bottom-nav::before {
  left: 0;
  background: linear-gradient(to right, rgba(8,9,10,0.95), transparent);
}
.bottom-nav::after {
  right: 0;
  background: linear-gradient(to left, rgba(8,9,10,0.95), transparent);
}

.nav-btn {
  flex-shrink: 0;
  min-width: 44px;
  scroll-margin-inline: 32px;
  height: 36px;
  padding: 0 10px;
  border: 1px solid var(--ghost-border);
  border-radius: 6px;
  background: var(--ghost-bg);
  color: var(--text-secondary);
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  white-space: nowrap;
}
.nav-btn:hover {
  background: rgba(255,255,255,0.08);
  border-color: var(--border-hover);
  color: var(--text-primary);
}
.nav-btn.active {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: 0 0 12px rgba(78,205,196,0.2);
}
.nav-btn .risk-dot {
  position: absolute;
  top: 4px;
  right: 4px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--risk-high);
}

/* ====== PAGE CONTENT (shared) ====== */
.page {
  display: none;
  opacity: 0;
  transform: translateY(20px);
  padding: 32px 28px 40px;
  min-height: 100%;
}
.page.active {
  display: block;
  animation: fadeSlideIn 0.25s ease-out forwards;
}
@keyframes fadeSlideIn {
  to { opacity: 1; transform: translateY(0); }
}

/* ====== OVERVIEW PAGE ====== */
.overview-hero {
  position: relative;
  margin: -32px -28px 28px;
  height: 280px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 32px 28px;
}
.overview-hero-bg {
  position: absolute;
  inset: 0;
  background: url('hero-bg.webp') center/cover no-repeat;
}
.overview-hero-bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom,
    rgba(8,9,10,0.2) 0%,
    rgba(8,9,10,0.1) 30%,
    rgba(8,9,10,0.5) 60%,
    rgba(8,9,10,0.95) 100%
  );
}
.overview-hero-content {
  position: relative;
  z-index: 1;
}
.overview-title {
  font-family: var(--font-display);
  font-size: 72px;
  font-weight: 700;
  letter-spacing: 6px;
  line-height: 0.92;
  text-transform: uppercase;
  color: var(--text-primary);
}
.overview-sub {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 8px;
  letter-spacing: 0.5px;
}

.section-label {
  font-size: 12px;
  font-weight: 400;
  color: var(--text-dim);
  letter-spacing: 0.5px;
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.kpi-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  margin-bottom: 32px;
}
.kpi-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px 16px;
  text-align: center;
}
.kpi-value {
  font-family: var(--font-display);
  font-size: 40px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1;
}
.kpi-unit {
  font-size: 0.4em;
  font-weight: 500;
  color: var(--text-secondary);
  letter-spacing: 1px;
  margin-left: 2px;
}
.kpi-label {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 6px;
}

/* Bar chart */
.chart-container {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px 16px 12px;
  margin-bottom: 20px;
  position: relative;
}
.chart-container svg { width: 100%; display: block; }
.chart-bar { cursor: pointer; transition: opacity 0.15s; }
.chart-bar:hover { opacity: 1 !important; }
.chart-tooltip {
  position: absolute;
  background: var(--bg-surface);
  border: 1px solid var(--border-hover);
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 12px;
  color: var(--text-primary);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 10;
  white-space: nowrap;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
}
.chart-tooltip.visible { opacity: 1; }
.chart-tooltip-title { font-weight: 600; margin-bottom: 2px; }
.chart-tooltip-km { color: var(--accent); font-family: var(--font-display); font-weight: 700; }

/* Risk strip */
.risk-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}
.risk-row span { font-size: 11px; color: var(--text-dim); }
.risk-strip {
  display: grid;
  grid-template-columns: repeat(11, 1fr);
  gap: 3px;
  margin-bottom: 20px;
}
.risk-strip-cell {
  height: 6px;
  border-radius: 2px;
  opacity: 0.7;
}
.aurora-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}
.aurora-label {
  font-size: 12px;
  color: var(--text-dim);
  flex-shrink: 0;
  min-width: 70px;
}
.aurora-dots {
  display: grid;
  grid-template-columns: repeat(11, 1fr);
  gap: 3px;
  flex: 1;
}
.aurora-dot {
  width: 100%;
  aspect-ratio: 1;
  max-width: 14px;
  border-radius: 50%;
  margin: 0 auto;
}
.aurora-dot.dim { border: 1.5px solid var(--text-dim); background: transparent; }
.aurora-dot.bright { background: #B388FF; box-shadow: 0 0 8px rgba(179,136,255,0.5); }

/* Overview accommodation strip */
.ov-accom-strip {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-bottom: 24px;
}
.ov-accom-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
}
.ov-accom-day {
  font-family: var(--font-display);
  font-weight: 600;
  color: var(--text-dim);
  min-width: 32px;
  letter-spacing: 0.5px;
}
.ov-accom-bar {
  flex: 1;
  height: 22px;
  border-radius: 4px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 8px;
  font-size: 11px;
  color: var(--text-secondary);
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}
.ov-accom-bar .accom-icon {
  margin-right: 6px;
  font-size: 10px;
  opacity: 0.6;
}

/* Overview booking reminders */
.booking-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 24px;
}
.booking-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.booking-info {
  flex: 1;
  min-width: 0;
}
.booking-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.booking-detail {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
}
.booking-price {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  white-space: nowrap;
}
.booking-link {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  border: 1px solid var(--ghost-border);
  border-radius: 4px;
  background: transparent;
  color: var(--accent);
  font-size: 11px;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.2s;
  white-space: nowrap;
}
.booking-link:hover {
  background: var(--accent-dim);
  border-color: var(--accent);
}

/* ====== DAY PAGE ====== */
.day-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 8px;
}
.day-num {
  font-family: var(--font-display);
  font-size: 72px;
  font-weight: 700;
  color: var(--accent);
  line-height: 0.85;
  letter-spacing: -2px;
}
.day-num.risk-high-color { color: var(--risk-high); }
.day-num.risk-mid-color { color: var(--risk-mid); }
.day-date {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  margin-top: 4px;
}
.day-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
}
.day-km {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 600;
  color: var(--text-secondary);
  letter-spacing: 0.5px;
}
.risk-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 4px;
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.risk-tag-low { background: rgba(78,205,196,0.12); color: var(--risk-low); border: 1px solid rgba(78,205,196,0.2); }
.risk-tag-mid { background: rgba(245,197,66,0.12); color: var(--risk-mid); border: 1px solid rgba(245,197,66,0.2); }
.risk-tag-high { background: rgba(255,107,107,0.12); color: var(--risk-high); border: 1px solid rgba(255,107,107,0.2); }

.day-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--text-primary);
  line-height: 1.2;
  margin-bottom: 16px;
}

/* Accommodation badge */
.accom-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 6px;
  background: rgba(78,205,196,0.08);
  border: 1px solid rgba(78,205,196,0.15);
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 16px;
}
.accom-badge .accom-icon {
  font-size: 12px;
  color: var(--accent);
  opacity: 0.8;
}

/* Drive segments */
.drive-segments {
  margin-bottom: 16px;
}
.drive-seg {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-dim);
  padding: 4px 0;
}
.drive-seg .seg-arrow {
  color: var(--text-dim);
  opacity: 0.5;
  font-size: 10px;
}
.drive-seg .seg-dur {
  margin-left: auto;
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 11px;
  color: var(--text-dim);
  opacity: 0.7;
}

/* Activities / bookings */
.act-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 8px;
}
.act-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 4px;
}
.act-price {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 4px;
}
.act-note {
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 8px;
  line-height: 1.5;
}
.act-link {
  display: inline-flex;
  align-items: center;
  padding: 4px 12px;
  border: 1px solid var(--ghost-border);
  border-radius: 4px;
  background: transparent;
  color: var(--accent);
  font-size: 11px;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.2s;
}
.act-link:hover {
  background: var(--accent-dim);
  border-color: var(--accent);
}

/* Timeline */
.timeline {
  position: relative;
  padding-left: 20px;
  margin-bottom: 20px;
}
.timeline::before {
  content: '';
  position: absolute;
  left: 7px;
  top: 4px;
  bottom: 4px;
  width: 2px;
  background: var(--border);
  border-radius: 1px;
}
.tl-item {
  position: relative;
  padding: 6px 0 6px 16px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.tl-dot {
  position: absolute;
  left: -16px;
  top: 12px;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  border: 2px solid;
  background: var(--bg);
  z-index: 1;
}
.tl-time {
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 600;
  min-width: 52px;
  flex-shrink: 0;
  letter-spacing: 0.5px;
  padding-top: 1px;
}
.tl-event {
  font-size: 13px;
  color: var(--text-primary);
  line-height: 1.5;
}

/* Timeline type colors */
.tl-item[data-type="drive"] .tl-dot { border-color: var(--tl-drive); }
.tl-item[data-type="drive"] .tl-time { color: var(--tl-drive); }
.tl-item[data-type="spot"] .tl-dot { border-color: var(--tl-spot); background: rgba(78,205,196,0.2); }
.tl-item[data-type="spot"] .tl-time { color: var(--tl-spot); }
.tl-item[data-type="activity"] .tl-dot { border-color: var(--tl-activity); background: rgba(245,197,66,0.2); }
.tl-item[data-type="activity"] .tl-time { color: var(--tl-activity); }
.tl-item[data-type="meal"] .tl-dot { border-color: var(--tl-meal); }
.tl-item[data-type="meal"] .tl-time { color: var(--tl-meal); }
.tl-item[data-type="stay"] .tl-dot { border-color: var(--tl-stay); }
.tl-item[data-type="stay"] .tl-time { color: var(--tl-stay); }
.tl-item[data-type="aurora"] .tl-dot { border-color: var(--tl-aurora); background: rgba(179,136,255,0.2); }
.tl-item[data-type="aurora"] .tl-time { color: var(--tl-aurora); }
.tl-item[data-type="hike"] .tl-dot { border-color: var(--tl-hike); background: rgba(255,158,68,0.2); }
.tl-item[data-type="hike"] .tl-time { color: var(--tl-hike); }
.tl-item[data-type="free"] .tl-dot { border-color: var(--tl-free); }
.tl-item[data-type="free"] .tl-time { color: var(--tl-free); }
.tl-item[data-type="rest"] .tl-dot { border-color: var(--tl-rest); }
.tl-item[data-type="rest"] .tl-time { color: var(--tl-rest); }
.tl-item[data-type="flight"] .tl-dot { border-color: var(--tl-flight); }
.tl-item[data-type="flight"] .tl-time { color: var(--tl-flight); }
.tl-item[data-type="walk"] .tl-dot { border-color: var(--tl-walk); background: rgba(78,205,196,0.2); }
.tl-item[data-type="walk"] .tl-time { color: var(--tl-walk); }

.day-desc {
  list-style: none;
  margin-bottom: 24px;
}
.day-desc li {
  position: relative;
  padding-left: 16px;
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 5px;
  line-height: 1.6;
}
.day-desc li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 9px;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--accent);
  opacity: 0.6;
}

.spots-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 8px;
}
.spot-list { display: flex; flex-direction: column; gap: 0; }
.spot-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  cursor: default;
  transition: background 0.15s;
  border-radius: 4px;
  padding-left: 4px;
  padding-right: 4px;
}
.spot-item:last-child { border-bottom: none; }
.spot-item:hover { background: rgba(255,255,255,0.03); }
.spot-item[data-spot-idx] { cursor: pointer; }
.spot-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
  opacity: 0.7;
}

/* Build route polylines + markers per day */
var dayPolylines = [];
var dayConnectors = [];
var dayMarkers = [];
var allBounds = [];
var clusterGroup = L.markerClusterGroup({
  maxClusterRadius: 35,
  spiderfyOnMaxZoom: true,
  showCoverageOnHover: false,
  iconCreateFunction: function(cluster) {
    var count = cluster.getChildCount();
    return L.divIcon({
      html: '<div style="background:var(--accent);color:#fff;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:14px;border:2px solid rgba(255,255,255,0.3);">' + count + '</div>',
      className: '', iconSize: [32, 32], iconAnchor: [16, 16]
    });
  }
});
map.addLayer(clusterGroup);

DAYS.forEach(function(d, di) {
  var coords = d.spots.map(function(s) { return [s.lat, s.lng]; });
  coords.forEach(function(c) { allBounds.push(c); });

  var poly = null;
  if (coords.length > 1) {
    poly = L.polyline(coords, { color: dayColor(di), weight: 3, opacity: 0.7, dashArray: '6,8' }).addTo(map);
  }
  dayPolylines.push(poly);

  var conn = null;
  if (di < DAYS.length - 1) {
    var last = d.spots[d.spots.length - 1];
    var nextFirst = DAYS[di + 1].spots[0];
    conn = L.polyline([[last.lat, last.lng], [nextFirst.lat, nextFirst.lng]], {
      color: dayColor(di), weight: 1.5, opacity: 0.2, dashArray: '4,6'
    }).addTo(map);
  }
  dayConnectors.push(conn);

  var markers = [];
  d.spots.forEach(function(s) {
    var icon = L.divIcon({
      html: markerSvg(dayColor(di)),
      className: '', iconSize: [28, 38], iconAnchor: [14, 38], popupAnchor: [0, -38]
    });
    var marker = L.marker([s.lat, s.lng], { icon: icon });
    clusterGroup.addLayer(marker);
    var popupHtml =
      '<div class="popup-day">Day ' + d.day + ' / ' + esc(d.date) + '</div>' +
      '<div class="popup-name-zh">' + esc(s.zh) + '</div>' +
      '<div class="popup-name-en">' + esc(s.en) + '</div>' +
      '<a class="popup-xhs-btn" href="' + xhsUrl(s.zh) + '" target="_blank" rel="noopener">XHS 小红书搜索</a>';
    marker.bindPopup(popupHtml, { maxWidth: 240, autoPanPadding: L.point(20, 60) });
    markers.push(marker);
  });
  dayMarkers.push(markers);
});

/* ═══════ MAP CONTROL FUNCTIONS ═══════ */
function showOverviewMap() {
  // Re-add all markers to cluster
  clusterGroup.clearLayers();
  DAYS.forEach(function(d, di) {
    if (dayPolylines[di]) {
      dayPolylines[di].setStyle({ opacity: 0.7, weight: 3, color: dayColor(di) });
    }
    if (dayConnectors[di]) {
      dayConnectors[di].setStyle({ opacity: 0.2 });
    }
    dayMarkers[di].forEach(function(m) { clusterGroup.addLayer(m); });
  });
  if (allBounds.length > 0) {
    map.flyToBounds(L.latLngBounds(allBounds).pad(0.1), { duration: 1.2 });
  }
  map.closePopup();
}

function showDayMap(dayIdx) {
  var d = DAYS[dayIdx];
  // Replace cluster with only active day markers
  clusterGroup.clearLayers();
  DAYS.forEach(function(_, di) {
    var isActive = di === dayIdx;
    if (dayPolylines[di]) {
      dayPolylines[di].setStyle({
        opacity: isActive ? 0.9 : 0.12,
        weight: isActive ? 4 : 1.5,
        color: isActive ? dayColor(di) : '#333'
      });
    }
    if (dayConnectors[di]) {
      dayConnectors[di].setStyle({ opacity: isActive ? 0.3 : 0.05 });
    }
    if (isActive) {
      dayMarkers[di].forEach(function(m) { clusterGroup.addLayer(m); });
    }
  });

  var coords = d.spots.map(function(s) { return [s.lat, s.lng]; });
  if (coords.length === 1) {
    map.flyTo(coords[0], 11, { duration: 1.2 });
  } else {
    map.flyToBounds(L.latLngBounds(coords).pad(0.4), { duration: 1.2 });
  }

  if (dayMarkers[dayIdx] && dayMarkers[dayIdx][0]) {
    setTimeout(function() { dayMarkers[dayIdx][0].openPopup(); }, 700);
  }

  if (dayPolylines[dayIdx]) {
    var el = dayPolylines[dayIdx].getElement();
    if (el) {
      var len = el.getTotalLength ? el.getTotalLength() : 1000;
      el.style.strokeDasharray = len;
      el.style.strokeDashoffset = len;
      el.getBoundingClientRect();
      el.style.transition = 'stroke-dashoffset 1.5s ease-in-out';
      el.style.strokeDashoffset = '0';
      setTimeout(function() {
        el.style.strokeDasharray = '6,8';
        el.style.strokeDashoffset = '';
        el.style.transition = '';
      }, 1600);
    }
  }
}

/* ═══════ PAGE SWITCHING ═══════ */
function goToPage(idx) {
  if (idx < 0 || idx >= totalPages) return;
  currentPage = idx;

  document.querySelectorAll('.nav-btn').forEach(function(btn, i) {
    btn.classList.toggle('active', i === idx);
    if (i === idx) btn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  });

  document.querySelectorAll('.page').forEach(function(p) {
    p.classList.remove('active');
  });
  var target = document.getElementById('page-' + idx);
  if (target) {
    target.classList.add('active');
  }

  contentPane.scrollTop = 0;

  if (idx === 0) {
    showOverviewMap();
    runOverviewAnimations();
  } else if (idx >= 1 && idx <= 11) {
    showDayMap(idx - 1);
  } else if (idx === 12) {
    showOverviewMap();
  }
}

/* ═══════ OVERVIEW ANIMATIONS ═══════ */
var overviewAnimated = false;

function runOverviewAnimations() {
  if (overviewAnimated) return;
  overviewAnimated = true;

  document.querySelectorAll('.kpi-value[data-count]').forEach(function(el) {
    var target = parseInt(el.dataset.count);
    var prefix = el.dataset.prefix || '';
    var suffix = el.dataset.suffix || '';
    var unitSpan = el.querySelector('.kpi-unit');
    var unitHtml = unitSpan ? unitSpan.outerHTML : '';
    var duration = 1200;
    var start = performance.now();

    function tick(now) {
      var elapsed = now - start;
      var progress = Math.min(elapsed / duration, 1);
      var ease = 1 - Math.pow(1 - progress, 3);
      var current = Math.round(target * ease);
      var display = target > 999 ? current.toLocaleString() : current;
      el.innerHTML = prefix + display + suffix + unitHtml;
      if (progress < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  });

  var bars = document.querySelectorAll('.bar-rect');
  var maxKm = Math.max.apply(null, KM);
  var chartH = 180;
  var padT = 30, padB = 24;
  var usableH = chartH - padT - padB;
  var baseY = padT + usableH;

  bars.forEach(function(bar, i) {
    var targetH = parseFloat(bar.dataset.targetH);
    var targetY = parseFloat(bar.dataset.targetY);
    bar.setAttribute('height', '0');
    bar.setAttribute('y', baseY);

    setTimeout(function() {
      bar.style.transition = 'all 0.6s cubic-bezier(0.22, 1, 0.36, 1)';
      bar.setAttribute('height', targetH);
      bar.setAttribute('y', targetY);
    }, 80 + i * 60);
  });
}

/* ═══════ CHART INTERACTIVITY ═══════ */
(function() {
  var container = document.getElementById('chart-container');
  var tooltip = document.getElementById('chart-tooltip');
  if (!container || !tooltip) return;

  container.addEventListener('mousemove', function(e) {
    var bar = e.target.closest('.chart-bar');
    if (!bar) { tooltip.classList.remove('visible'); return; }
    var dayIdx = parseInt(bar.dataset.day);
    tooltip.querySelector('.chart-tooltip-title').textContent = 'D' + (dayIdx + 1) + ' ' + DAY_TITLES[dayIdx];
    tooltip.querySelector('.chart-tooltip-km').textContent = KM[dayIdx] + ' km';
    tooltip.classList.add('visible');
    var rect = container.getBoundingClientRect();
    tooltip.style.left = (e.clientX - rect.left + 12) + 'px';
    tooltip.style.top = (e.clientY - rect.top - 40) + 'px';
  });

  container.addEventListener('mouseleave', function() {
    tooltip.classList.remove('visible');
  });

  /* Touch: show tooltip anchored to bar top center */
  container.addEventListener('touchstart', function(e) {
    var bar = e.target.closest('.chart-bar');
    if (!bar) { tooltip.classList.remove('visible'); return; }
    var dayIdx = parseInt(bar.dataset.day);
    tooltip.querySelector('.chart-tooltip-title').textContent = 'D' + (dayIdx + 1) + ' ' + DAY_TITLES[dayIdx];
    tooltip.querySelector('.chart-tooltip-km').textContent = KM[dayIdx] + ' km';
    tooltip.classList.add('visible');
    var barRect = bar.querySelector('.bar-rect');
    if (barRect) {
      var cRect = container.getBoundingClientRect();
      var bRect = barRect.getBoundingClientRect();
      tooltip.style.left = (bRect.left - cRect.left + bRect.width / 2) + 'px';
      tooltip.style.top = (bRect.top - cRect.top - 40) + 'px';
    }
  }, { passive: true });

  document.addEventListener('touchstart', function(e) {
    if (!container.contains(e.target)) tooltip.classList.remove('visible');
  }, { passive: true });

  container.addEventListener('click', function(e) {
    var bar = e.target.closest('.chart-bar');
    if (!bar) return;
    var dayIdx = parseInt(bar.dataset.day);
    goToPage(dayIdx + 1);
  });
})();

/* ═══════ SPOT HOVER -> MARKER PULSE ═══════ */
contentPane.addEventListener('mouseenter', function(e) {
  var item = e.target.closest('.spot-item[data-spot-idx]');
  if (!item) return;
  var di = parseInt(item.dataset.day);
  var si = parseInt(item.dataset.spotIdx);
  var marker = dayMarkers[di] && dayMarkers[di][si];
  if (marker) {
    marker.openPopup();
    var el = marker.getElement();
    if (el) { el.classList.add('marker-pulse'); }
  }
}, true);

contentPane.addEventListener('mouseleave', function(e) {
  var item = e.target.closest('.spot-item[data-spot-idx]');
  if (!item) return;
  var di = parseInt(item.dataset.day);
  var si = parseInt(item.dataset.spotIdx);
  var marker = dayMarkers[di] && dayMarkers[di][si];
  if (marker) {
    var el = marker.getElement();
    if (el) { el.classList.remove('marker-pulse'); }
  }
}, true);

/* ═══════ COLLAPSE (INFO PAGE) ═══════ */
document.addEventListener('click', function(e) {
  var header = e.target.closest('.collapse-header');
  if (!header) return;
  var ci = header.dataset.collapse;
  var body = document.getElementById('cbody-' + ci);
  var toggle = document.getElementById('ctoggle-' + ci);
  if (body) body.classList.toggle('open');
  if (toggle) toggle.classList.toggle('open');
});

/* ═══════ KEYBOARD NAV ═══════ */
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    e.preventDefault();
    goToPage(Math.min(currentPage + 1, totalPages - 1));
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault();
    goToPage(Math.max(currentPage - 1, 0));
  }
});

/* ═══════ TOUCH SWIPE (content-pane + map-pane) ═══════ */
(function() {
  var startX = 0, startY = 0, tracking = false;
  function onTouchStart(e) {
    if (e.touches.length === 1) {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      tracking = true;
    }
  }
  function onTouchEnd(e) {
    if (!tracking) return;
    tracking = false;
    var endX = e.changedTouches[0].clientX;
    var endY = e.changedTouches[0].clientY;
    var dx = endX - startX;
    var dy = endY - startY;
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      if (dx < 0) goToPage(Math.min(currentPage + 1, totalPages - 1));
      else goToPage(Math.max(currentPage - 1, 0));
    }
  }
  contentPane.addEventListener('touchstart', onTouchStart, { passive: true });
  contentPane.addEventListener('touchend', onTouchEnd, { passive: true });
  var mapPane = document.querySelector('.map-pane');
  if (mapPane) {
    mapPane.addEventListener('touchstart', onTouchStart, { passive: true });
    mapPane.addEventListener('touchend', onTouchEnd, { passive: true });
  }
})();

/* ═══════ INIT ═══════ */
goToPage(0);

</script>

const RARITY_RATES = {legend:0.05, epic:0.20, rare:0.40, common:0.35};
const RARITY_META = {
  legend:  {label:'传说', color:'var(--r-legend)', levels:['P9','P10','M2','M3']},
  epic:    {label:'史诗', color:'var(--r-epic)',   levels:['P7','P8','M1']},
  rare:    {label:'稀有', color:'var(--r-rare)',   levels:['P5','P6']},
  common:  {label:'普通', color:'var(--r-common)', levels:['P3','P4']},
};
const HD_PER_PULL = 10;

function rollRarity(){
  const r = Math.random();
  let acc = 0;
  for (const k of ['legend','epic','rare','common']){ acc += RARITY_RATES[k]; if (r < acc) return k; }
  return 'common';
}

async function genJD(role, rarity){
  const meta = RARITY_META[rarity];
  const level = meta.levels[Math.floor(Math.random()*meta.levels.length)];
  // try AI
  try{
    const proj = state.projects && state.projects[0];
    const ctx = state.projects ? state.projects.slice(0,3).map(p=>`${p.name}：${p.goal||''}`).join('\n') : '';
    const prompt = `你是游戏公司招聘经理，为下面这个职位生一份简短 JD。
职位：${role}
职级：${level} (稀有度 ${meta.label})
项目上下文：${ctx}

以 JSON 输出，严格格式，不要 markdown：
{
  "hero_name": "一个带中二点的游戏化英雄名号（4-8 字）",
  "summary": "一句话用遇什么人的口吻 (20 字以内)",
  "responsibilities": ["职责 1","职责 2","职责 3"],
  "requirements": ["要求 1","要求 2","要求 3"]
}`;
    const r = await fetch('/teamforge-api/ai', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt})});
    if (r.ok){
      const j = await r.json();
      let raw = (j.text||'').trim();
      const m = raw.match(/\{[\s\S]*\}/); if (m) raw = m[0];
      const data = JSON.parse(raw);
      return Object.assign({role, level, rarity}, data);
    }
  }catch(_){}
  // fallback
  return {role, level, rarity, hero_name: role, summary:'一位可靠的同伴', responsibilities:['推动项目','交付产出','协作团队'], requirements:['相关经验','沟通能力','成长型心态']};
}

async function doSummon(n){
  const cost = HD_PER_PULL * n;
  const hd = summonGetHD();
  if (hd < cost){ toast('HD 不够 · 需要 '+cost+'、余额 '+hd); return; }
  summonSetHD(hd - cost);
  const area = document.getElementById('summon-result-area');
  area.innerHTML = '<div class="ai-loading"><div class="spin"></div>召唤中… (AI 生成 '+n+' 个英雄 JD)</div>';
  const tasks = [];
  for (let i=0;i<n;i++){
    const role = ROLE_POOL[Math.floor(Math.random()*ROLE_POOL.length)];
    const rarity = rollRarity();
    tasks.push(genJD(role, rarity));
  }
  let results;
  try{ results = await Promise.all(tasks.map(p=>p.catch(e=>({role:'?',rarity:'common',level:'?',hero_name:'召唤失败',summary:String(e&&e.message||e),responsibilities:[],requirements:[]})))); }
  catch(e){ area.innerHTML='<div class="ai-loading">召唤失败：'+esc(e.message)+'</div>'; return; }
  summonPushLog(results);
  area.innerHTML = '<div class="summon-result">' + results.map(it=>`
    <div class="hcard ${it.rarity}" onclick='showJD(${JSON.stringify(it).replace(/'/g,"&apos;")})'>
      <div class="hportrait">${RARITY_SVG[it.rarity]||''}</div>
      <div class="hname">${esc(it.hero_name||it.role)}</div>
      <div class="hjob">${esc(it.role)}</div>
      <span class="hrarity">${RARITY_META[it.rarity].label} · ${esc(it.level||'')}</span>
    </div>
  `).join('') + '</div>';
  // refresh log section without redrawing buttons
  setTimeout(()=>{
    const root = document.getElementById('page-summon');
    const log = summonLog();
    const sl = root.querySelector('.summon-log');
    if (sl) sl.innerHTML = `<h3>召唤记录 (${log.length})</h3>` + (log.length ? `<div class="slog-grid">${log.slice().reverse().slice(0,40).map(it=>`
          <div class="slog-cell ${it.rarity}"><span class="dot"></span>
            <div style="flex:1;min-width:0"><div class="sname">${esc(it.hero_name||it.role)}</div><div class="sjob">${esc(it.role)} · ${esc(it.level||'')}</div></div>
          </div>
        `).join('')}</div>` : '<div class="empty">还没召唤过</div>');
  }, 400);
}

function doSummonCustom(){
  const el = document.getElementById('summon-n');
  let n = parseInt(el && el.value || '5',10);
  if (!n || n<1) n=1; if (n>50) n=50;
  doSummon(n);
}

function showJD(it){
  const html = `
    <div class="ai-modal jd-modal" style="max-height:88vh;display:flex;flex-direction:column">
      <button class="close-x" onclick="this.parentElement.parentElement.classList.remove('open')">✕</button>
      <h3 style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <span style="width:32px;height:32px;border-radius:10px;background:${RARITY_META[it.rarity].color};display:inline-flex;align-items:center;justify-content:center;border:2px solid rgba(0,0,0,0.4)"><svg viewBox='0 0 24 24' width='20' height='20' style='fill:none;stroke:#000;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round'>${(RARITY_SVG[it.rarity]||'').replace(/<svg[^>]*>|<\/svg>/g,'')}</svg></span>
        ${esc(it.hero_name||it.role)}
        <span class="hrarity ${it.rarity}" style="font-size:11px;font-weight:800;padding:3px 10px;border-radius:8px;background:${RARITY_META[it.rarity].color};color:#000;border:2px solid rgba(0,0,0,0.4)">${RARITY_META[it.rarity].label} · ${esc(it.level||'')}</span>
      </h3>
      <div class="ai-sub">${esc(it.role)} · AI 生成的招聘 JD</div>
      <div class="ai-body" style="flex:1;overflow-y:auto">
        <div class="jd-section"><h5>一句话</h5>${esc(it.summary||'')}</div>
        <div class="jd-section"><h5>职责</h5><ul style="padding-left:20px">${(it.responsibilities||[]).map(r=>`<li>${esc(r)}</li>`).join('')}</ul></div>
        <div class="jd-section"><h5>要求</h5><ul style="padding-left:20px">${(it.requirements||[]).map(r=>`<li>${esc(r)}</li>`).join('')}</ul></div>
      </div>
    </div>`;
  let mask = document.getElementById('jd-mask');
  if (!mask){
    mask = document.createElement('div');
    mask.id='jd-mask'; mask.className='ai-modal-mask';
    mask.onclick = (e)=>{ if (e.target===mask) mask.classList.remove('open'); };
    document.body.appendChild(mask);
  }
  mask.innerHTML = html;
  mask.classList.add('open');
}

function summonRecharge(){
  const n = parseInt(prompt('充值多少 HD？','100')||'0',10);
  if (!n || n<=0) return;
  summonAddHD(n);
  toast('+'+n+' HD'); renderSummon();
}
function summonReset(){
  if (!confirm('重置召唤记录 + HD？')) return;
  localStorage.removeItem(SUMMON_KEY);
  renderSummon(); updateResBar();
}

// ============ Resource bar ============
function updateResBar(){
  const proj = state.projects||[];
  const trophy = proj.filter(p=>p.status==='archived').length;
  const chars = (state.chars||[]).filter(c=>!c.deleted);
  const power = chars.reduce((s,c)=>s + (c.skills ? Object.values(c.skills).reduce((a,b)=>a+(parseInt(b)||0),0) : 30), 0);
  // energy = this week tasks done count (approx)
  let energy = 0;
  const since = Date.now() - 7*86400000;
  Object.values(state.tasksByProj||{}).forEach(arr=>arr.forEach(t=>{ if (t.status==='done' && (!t.updated_at || new Date(t.updated_at).getTime()>since)) energy++; }));
  const setText=(id,v)=>{const el=document.getElementById(id);if(el) el.textContent=v;};
  setText('res-power', power);
  setText('res-trophy', trophy);
  setText('res-energy', energy);
  setText('res-hd', summonGetHD());
}

routeRender();
</script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>智能推荐 · 家电选购指南</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --black:#1d1d1f;--gray-dark:#424245;--gray:#6e6e73;--gray-light:#86868b;
  --gray-border:#d2d2d7;--bg:#fff;--bg-alt:#f5f5f7;--blue:#0071e3;
}
body{font-family:-apple-system,'SF Pro Text','SF Pro Display','Noto Sans SC','Helvetica Neue',sans-serif;color:var(--black);background:var(--bg);-webkit-font-smoothing:antialiased;line-height:1.47;font-size:17px;letter-spacing:-0.374px}
a{color:var(--blue);text-decoration:none}

/* NAV */
.topnav{
  position:sticky;top:0;z-index:100;background:rgba(0,0,0,0.8);
  backdrop-filter:saturate(180%) blur(20px);
  display:flex;align-items:center;justify-content:center;gap:0;
  padding:0 20px;height:48px;
}
.topnav a{font-size:12px;color:rgba(255,255,255,0.8);padding:0 12px;line-height:48px;letter-spacing:-0.12px}
.topnav a:hover{color:#fff}

/* HERO */
.hero{
  background:#000;color:#fff;text-align:center;padding:100px 40px 80px;
}
.hero-label{font-size:17px;font-weight:600;color:rgba(255,255,255,0.8);margin-bottom:16px}
.hero h1{font-size:clamp(40px,7vw,56px);font-weight:600;letter-spacing:-0.28px;line-height:1.07;color:#fff}
.hero p{font-size:clamp(17px,2.5vw,21px);color:rgba(255,255,255,0.8);margin-top:16px;max-width:600px;margin-left:auto;margin-right:auto}

/* MAIN */
.wizard{max-width:760px;margin:0 auto;padding:60px 24px}
.step{display:none;animation:fadeIn 0.4s ease}
.step.active{display:block}
.step-num{font-size:14px;font-weight:600;color:var(--blue);letter-spacing:-0.224px;margin-bottom:12px}
.step h2{font-size:clamp(28px,5vw,40px);font-weight:600;letter-spacing:-0.5px;line-height:1.1;margin-bottom:16px}
.step .helper{font-size:17px;color:var(--gray);margin-bottom:40px}

.options{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:40px}
.option-card{
  border:1.5px solid var(--gray-border);border-radius:14px;padding:20px;
  cursor:pointer;transition:all 0.2s;background:var(--bg);text-align:left;
  font-family:inherit;font-size:inherit;color:inherit;
}
.option-card:hover{border-color:var(--blue);background:rgba(0,113,227,0.04)}
.option-card.selected{border-color:var(--blue);background:rgba(0,113,227,0.08)}
.option-card .icon{font-size:36px;line-height:1;margin-bottom:10px}
.option-card .name{font-size:17px;font-weight:600;margin-bottom:4px}
.option-card .sub{font-size:13px;color:var(--gray);line-height:1.4}

/* slider */
.range-wrap{margin:40px 0}
.range-display{text-align:center;font-size:32px;font-weight:600;color:var(--black);margin-bottom:20px;letter-spacing:-0.5px}
.range-display .currency{font-size:20px;color:var(--gray);font-weight:400}
input[type="range"]{
  width:100%;height:6px;-webkit-appearance:none;appearance:none;
  background:linear-gradient(to right,var(--blue) var(--p,50%),var(--gray-border) var(--p,50%));
  border-radius:6px;outline:none;
}
input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;width:28px;height:28px;background:#fff;
  border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.15);cursor:pointer;border:1px solid var(--gray-border);
}
.range-labels{display:flex;justify-content:space-between;margin-top:10px;font-size:13px;color:var(--gray-light)}

/* buttons */
.actions{display:flex;justify-content:space-between;align-items:center;margin-top:20px;gap:12px}
.btn{
  padding:12px 28px;border-radius:980px;font-size:17px;font-weight:400;
  cursor:pointer;font-family:inherit;letter-spacing:-0.374px;border:none;transition:filter 0.2s;
}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{filter:brightness(1.1)}
.btn-primary:disabled{background:var(--gray-border);color:var(--gray-light);cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--gray-dark);border:1px solid var(--gray-border)}
.btn-ghost:hover{color:var(--black);border-color:var(--black)}

/* progress */
.progress{display:flex;gap:6px;margin-bottom:48px;justify-content:center}
.progress .step-dot{width:32px;height:4px;border-radius:2px;background:var(--gray-border);transition:background 0.3s;display:inline-block}
.progress .step-dot.done{background:var(--blue)}

/* result */
.result-card{
  background:var(--bg-alt);border-radius:18px;padding:32px;margin-bottom:16px;
  box-shadow:rgba(0,0,0,0.04) 0px 2px 12px 0px;
}
.result-card.top{
  background:linear-gradient(135deg,#1d1d1f 0%,#3a3a3c 100%);color:#fff;
}
.result-card.top .price{color:#2997ff}
.result-card.top .reason{color:rgba(255,255,255,0.75)}
.result-rank{font-size:13px;font-weight:600;color:var(--blue);letter-spacing:-0.224px;margin-bottom:8px}
.result-card.top .result-rank{color:#2997ff}
.result-name{font-size:24px;font-weight:600;letter-spacing:-0.4px;margin-bottom:6px}
.price{font-size:22px;font-weight:500;color:var(--blue);margin-bottom:14px}
.reason{font-size:15px;color:var(--gray-dark);line-height:1.6;margin-bottom:16px}
.tags{display:flex;flex-wrap:wrap;gap:8px}
.tag{font-size:12px;padding:4px 10px;border-radius:980px;background:rgba(0,0,0,0.06);color:var(--gray-dark)}
.result-card.top .tag{background:rgba(255,255,255,0.12);color:#fff}
.result-link{display:inline-block;margin-top:14px;font-size:15px;color:var(--blue);font-weight:500}
.result-card.top .result-link{color:#2997ff}
.empty-state{text-align:center;padding:80px 24px;color:var(--gray)}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:640px){
  .wizard{padding:40px 16px}
  .options{grid-template-columns:1fr}
}
</style>
</head>

    </div>
    <div class="actions">
      <button class="btn btn-ghost" data-back>返回</button>
      <button class="btn btn-primary" id="nextBtn2">下一步</button>
    </div>
  </div>

    <p class="step-num">第 3 步</p>
    <h2>最在意什么？</h2>
    <p class="helper">可多选，影响推荐排序。</p>
    <div class="options" id="needOpts"></div>
    <div class="actions">
      <button class="btn btn-ghost" data-back>返回</button>

    </div>
  </div>

  <div class="step" data-step="4">

    <h2>这 3 款值得看。</h2>
    <p class="helper" id="resultHelper">基于预算和需求匹配</p>
    <div id="results"></div>
    <div class="actions" style="margin-top:32px">

      <a href="/appliance-guide/index.html" class="btn btn-primary" style="text-decoration:none;display:inline-flex;align-items:center">返回首页</a>
    </div>
  </div>

</div>

    {key:'高端',icon:'👑',name:'高端',sub:'10000+'},
    {key:'性价比',icon:'⚖️',name:'性价比',sub:'5000档'}
  ],
  'induction-cooker': [
    {key:'双头',icon:'🔥',name:'双头',sub:'同时两锅'},
    {key:'单头',icon:'🍳',name:'单头',sub:'够用就行'},
    {key:'高端',icon:'👑',name:'高端',sub:'米技/WMF'},
    {key:'预算友好',icon:'💰',name:'预算友好',sub:'500以下'}
  ],
  'underwear-washer': [
    {key:'壁挂',icon:'🧱',name:'壁挂',sub:'墙面安装'},
    {key:'台面',icon:'📐',name:'台面',sub:'放台面'},
    {key:'高温杀菌',icon:'🔥',name:'高温杀菌',sub:'95°C 煮洗'},
    {key:'静音',icon:'🔇',name:'静音',sub:'夜间运行'},
    {key:'颜值高',icon:'✨',name:'颜值高',sub:'外观加分'}
  ],
  'hiking-backpack': [
    {key:'日常通勤',icon:'🏙️',name:'日常通勤',sub:'<25L'},
    {key:'轻量登山',icon:'⛰️',name:'轻量登山',sub:'30-40L 一日'},
    {key:'重装穿越',icon:'🏔️',name:'重装穿越',sub:'50L+ 多日'},
    {key:'背负舒适',icon:'🦴',name:'背负舒适',sub:'网背/腰带'},
    {key:'轻量',icon:'🪶',name:'轻量',sub:'<1kg'}
  ]
};

// =============================
// STATE
// =============================
const state = {step:1, cat:null, price:3000, needs:new Set()};

// =============================
// UI HELPERS
// =============================
function showStep(n) {
  state.step = n;
  document.querySelectorAll('.step').forEach(s=>{
    s.classList.toggle('active', s.dataset.step === String(n));
  });
  document.querySelectorAll('.step-dot').forEach((d,i)=>{
    d.classList.toggle('done', i < n);
  });
  window.scrollTo({top:0, behavior:'smooth'});
}

// STEP 1: cat selection
document.querySelectorAll('#catOpts .option-card').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('#catOpts .option-card').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    state.cat = btn.dataset.cat;
    document.getElementById('nextBtn1').disabled = false;
  });
});
document.getElementById('nextBtn1').addEventListener('click', ()=>{
  // Adjust price range based on cat
  const range = document.getElementById('priceRange');
  const ranges = {
    'robot-vacuum':{min:1000,max:9000,def:3000},
    'washer-dryer':{min:3000,max:30000,def:8000},
    'dishwasher':{min:2000,max:15000,def:6000},
    'steam-oven':{min:2000,max:15000,def:6000},
    'induction-cooker':{min:200,max:5000,def:1000},
    'underwear-washer':{min:600,max:4000,def:1500},
    'hiking-backpack':{min:80,max:4000,def:1500}
  };
  const r = ranges[state.cat];
  range.min = r.min; range.max = r.max; range.value = r.def;
  state.price = r.def;
  document.getElementById('priceVal').textContent = r.def.toLocaleString();
  updateRangeBg(range);
  showStep(2);
});

// STEP 2: price
const priceRange = document.getElementById('priceRange');
function updateRangeBg(r){
  const p = (r.value-r.min)/(r.max-r.min)*100;
  r.style.setProperty('--p', p+'%');
}
priceRange.addEventListener('input', e=>{
  state.price = parseInt(e.target.value);
  document.getElementById('priceVal').textContent = state.price.toLocaleString();
  updateRangeBg(e.target);
});
document.getElementById('nextBtn2').addEventListener('click', ()=>{
  // Build needs options
  const optsEl = document.getElementById('needOpts');
  optsEl.innerHTML = '';
  state.needs = new Set();
  (NEEDS[state.cat]||[]).forEach(n=>{
    const btn = document.createElement('button');
    btn.className = 'option-card';
    btn.dataset.need = n.key;
    btn.innerHTML = `<div class="icon">${n.icon}</div><div class="name">${n.name}</div><div class="sub">${n.sub}</div>`;
    btn.addEventListener('click', ()=>{
      if(state.needs.has(n.key)){
        state.needs.delete(n.key);
        btn.classList.remove('selected');
      } else {
        state.needs.add(n.key);
        btn.classList.add('selected');
      }
    });
    optsEl.appendChild(btn);
  });
  showStep(3);
});

// STEP 3 -> 4: compute
document.getElementById('nextBtn3').addEventListener('click', ()=>{
  const products = PRODUCTS[state.cat] || [];
  const targetPrice = state.price;
  const needs = Array.from(state.needs);

  // Score each: distance to price (closer better) + needs match count
  const scored = products.map(p=>{
    const priceDiff = Math.abs(p.price - targetPrice) / targetPrice;
    const priceScore = Math.max(0, 1 - priceDiff); // 0-1
    const tagMatches = needs.filter(n => p.tags.includes(n)).length;
    const tagScore = needs.length ? tagMatches/needs.length : 0;
    const score = priceScore * 0.5 + tagScore * 0.5;
    return {...p, score, priceScore, tagScore};
  });
  scored.sort((a,b)=>b.score-a.score);
  const top3 = scored.slice(0,3);

  const resultsEl = document.getElementById('results');
  resultsEl.innerHTML = '';
  const rankNames = ['最值得买','次推荐','备选'];
  top3.forEach((p, i)=>{
    const card = document.createElement('div');
    card.className = 'result-card' + (i===0 ? ' top' : '');
    const tagsHtml = p.tags.map(t=>`<span class="tag">${t}</span>`).join('');
    card.innerHTML = `
      <p class="result-rank">${rankNames[i]} · 匹配度 ${Math.round(p.score*100)}%</p>
      <div class="result-name">${p.name}</div>
      <div class="price">¥${p.price.toLocaleString()}</div>
      <p class="reason">${p.reason}</p>
      <div class="tags">${tagsHtml}</div>
      <a href="/appliance-guide/categories/${p.url}" class="result-link">在对比表中查看 →</a>
    `;
    resultsEl.appendChild(card);
  });
  document.getElementById('resultHelper').textContent = 
    `预算 ¥${targetPrice.toLocaleString()}${needs.length ? '，看重' + needs.join('/') : ''}`;
  showStep(4);
});

// BACK
document.querySelectorAll('[data-back]').forEach(b=>{
  b.addEventListener('click', ()=> showStep(state.step - 1));
});

// RESTART
document.getElementById('restart').addEventListener('click', ()=>{
  state.cat = null;
  state.needs.clear();
  document.querySelectorAll('.option-card.selected').forEach(b=>b.classList.remove('selected'));
  document.getElementById('nextBtn1').disabled = true;
  showStep(1);
});

updateRangeBg(priceRange);
</script>

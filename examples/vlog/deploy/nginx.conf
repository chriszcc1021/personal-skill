# nginx snippets for vlog (drop into a site's server block, behind HTTPS/cloudflare)
location /vlog/ {
    alias /var/www/vlog/frontend/;
    index index.html;
    try_files $uri $uri/ /vlog/index.html;
}

location /vlog-api/ {
    proxy_pass http://127.0.0.1:8082/api/;
    proxy_http_version 1.1;
    client_max_body_size 500M;
    proxy_read_timeout 600s;
}

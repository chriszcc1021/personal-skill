<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vlog">
<meta name="theme-color" content="#0A0A0A">
<link rel="apple-touch-icon" href="/vlog/icon-180.png">
<link rel="manifest" href="/vlog/manifest.json">
<title>Vlog</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{background:#000;color:#fff;font-family:'Inter',system-ui,sans-serif;min-height:100vh;overscroll-behavior:none;font-size:15px}
  body{padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
  .mono{font-family:'JetBrains Mono',monospace}
  .container{max-width:560px;margin:0 auto;padding:12px 14px 24px}
  header{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0 14px}
  header h1{font-size:20px;font-weight:700;letter-spacing:-0.02em}
  header h1 span{color:#666;font-weight:400;font-size:13px;margin-left:6px}
  header .btn-history{background:transparent;border:0;color:#888;font-size:13px;cursor:pointer;padding:6px 0}
  header .btn-history:hover{color:#fff}

  .quota{padding:6px 12px;background:transparent;border:0;font-size:11px;color:#666;display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .quota .bar{flex:1;height:2px;background:#1a1a1a;border-radius:1px;overflow:hidden}
  .quota .bar>div{height:100%;background:#444;transition:width 0.3s}
  .quota.warn .bar>div{background:#cc8800}
  .quota.full .bar>div{background:#cc3333}

  /* compact section */
  .section{background:#0f0f0f;border:1px solid #1a1a1a;border-radius:12px;padding:14px;margin-bottom:10px}
  .section .label{font-size:11px;color:#666;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px;font-weight:500;display:flex;align-items:center;justify-content:space-between}
  .section .label .hint{color:#444;font-size:10px;text-transform:none;letter-spacing:0;font-weight:400}

  .drop{border:1px dashed #2a2a2a;border-radius:10px;padding:18px 14px;text-align:center;cursor:pointer;transition:.15s}
  .drop:active{background:#161616;border-color:#444}
  .drop p{color:#888;font-size:13px}
  .drop .small{color:#444;font-size:11px;margin-top:4px}
  .drop input{display:none}

  .asset-list{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:10px}
  .asset{position:relative;aspect-ratio:1;border-radius:6px;overflow:hidden;background:#161616;display:flex;align-items:center;justify-content:center;font-size:11px;color:#555}
  .asset img{width:100%;height:100%;object-fit:cover}
  .asset .badge{position:absolute;top:3px;left:3px;background:rgba(0,0,0,0.7);padding:1px 4px;border-radius:3px;font-size:9px;z-index:2}
  .asset .del{position:absolute;top:3px;right:3px;width:18px;height:18px;background:rgba(0,0,0,0.85);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;z-index:3;color:#fff}
  .asset .retry{position:absolute;top:3px;left:3px;width:18px;height:18px;background:rgba(220,80,80,0.9);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;z-index:3;color:#fff}
  .asset.errored{outline:1px solid #c33}
  .asset.uploading::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,rgba(255,255,255,0.04) 0 10px,transparent 10px 20px);animation:slide 1s linear infinite;z-index:1}
  @keyframes slide{0%{background-position:0 0}100%{background-position:28px 0}}
  .asset .pct{position:absolute;bottom:3px;left:3px;right:3px;background:rgba(0,0,0,0.8);padding:1px 4px;border-radius:3px;font-size:9px;text-align:center;z-index:2}

  /* unified row for title+prompt */
  .row2{display:grid;grid-template-columns:1fr 1.4fr;gap:8px}
  @media(max-width:380px){.row2{grid-template-columns:1fr}}

  textarea,input[type=text]{width:100%;background:#000;border:1px solid #1f1f1f;border-radius:8px;padding:10px 12px;color:#fff;font-size:14px;font-family:inherit;resize:none}
  textarea{min-height:44px;max-height:80px}
  textarea:focus,input[type=text]:focus{outline:none;border-color:#3a3a3a}
  input[type=text]::placeholder,textarea::placeholder{color:#3a3a3a}

  .ref-list{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .ref{padding:4px 9px;background:#161616;border-radius:5px;font-size:11px;color:#888;border:1px solid #1f1f1f;cursor:pointer}
  .ref.active{border-color:#666;color:#fff}
  .ref-add{display:inline-flex;align-items:center;gap:4px;padding:4px 9px;background:transparent;border:1px dashed #2a2a2a;border-radius:5px;font-size:11px;color:#666;cursor:pointer}

  .btn{width:100%;padding:13px;border-radius:10px;border:0;background:#fff;color:#000;font-size:14px;font-weight:600;cursor:pointer;transition:.15s;font-family:inherit;letter-spacing:-0.005em}
  .btn:active{transform:scale(0.99)}
  .btn:disabled{background:#1a1a1a;color:#555;cursor:not-allowed}
  .btn.secondary{background:#161616;color:#fff;border:1px solid #262626}

  /* sticky bottom CTA on mobile */
  .btn-row{position:sticky;bottom:env(safe-area-inset-bottom);padding-top:6px;background:linear-gradient(to top,#000 70%,rgba(0,0,0,0));z-index:10;margin-top:8px}

  .progress{padding:18px}
  .progress-bar{width:100%;height:3px;background:#1a1a1a;border-radius:2px;overflow:hidden;margin:8px 0 6px}
  .progress-bar>div{height:100%;background:#fff;transition:width 0.3s}
  .progress .pct{font-size:24px;font-weight:600;font-variant-numeric:tabular-nums}
  .progress .log{color:#555;font-size:10px;margin-top:4px;min-height:14px;font-family:'JetBrains Mono',monospace;word-break:break-all}

  video{width:100%;border-radius:10px;background:#000}
  .result{text-align:left}
  .result-btns{margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px}

  .toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:#fff;color:#000;padding:8px 14px;border-radius:6px;font-size:12px;font-weight:500;z-index:1000;opacity:0;transition:.2s;pointer-events:none;max-width:90%;text-align:center}
  .toast.show{opacity:1}

  /* History drawer */
  .drawer{position:fixed;inset:0;background:#000;z-index:500;transform:translateY(100%);transition:transform 0.25s;overflow-y:auto;padding:14px 14px env(safe-area-inset-bottom);display:flex;flex-direction:column}
  .drawer.open{transform:translateY(0)}
  .drawer-head{display:flex;justify-content:space-between;align-items:center;padding:8px 0 16px;border-bottom:1px solid #1a1a1a;margin-bottom:16px;position:sticky;top:0;background:#0A0A0A}
  .drawer-head h2{font-size:18px;font-weight:700}
  .drawer-head .close{background:#1a1a1a;border:0;color:#fff;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer}
  .jobs-toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
  .jobs-toolbar button{padding:8px 12px;background:#1a1a1a;border:1px solid #2a2a2a;color:#fff;border-radius:8px;font-size:12px;cursor:pointer}
  .jobs-toolbar button.danger{background:#3a1010;border-color:#7a2020;color:#ff8888}
  .jobs-list{display:flex;flex-direction:column;gap:10px}
  .job-card{display:flex;gap:12px;padding:10px;background:#141414;border:1px solid #1f1f1f;border-radius:10px;align-items:center}
  .job-card .check{width:22px;height:22px;border:2px solid #555;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .job-card .check.on{background:#fff;border-color:#fff;color:#000}
  .job-card .check.on::before{content:'✓';font-size:14px;font-weight:700}
  .job-card .thumb{width:60px;height:80px;background:#222;border-radius:6px;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:11px;color:#666}
  .job-card .thumb img{width:100%;height:100%;object-fit:cover}
  .job-card .info{flex:1;min-width:0}
  .job-card .info h4{font-size:13px;font-weight:600;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .job-card .info p{color:#888;font-size:11px;line-height:1.4}
  .job-card .actions{display:flex;gap:6px;flex-shrink:0}
  .job-card .actions button{padding:6px 10px;background:#1a1a1a;border:0;color:#fff;border-radius:6px;font-size:11px;cursor:pointer}
  .status-pill{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;margin-right:4px}
  .status-pill.running{background:#1a3a5a;color:#7fb8ff}
  .status-pill.done{background:#1a3a1a;color:#7fff7f}
  .status-pill.error{background:#3a1a1a;color:#ff7f7f}
  .status-pill.queued{background:#2a2a2a;color:#aaa}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Vlog<span>AI 剪辑</span></h1>
    <button class="btn-history" id="open-history">历史</button>
  </header>

  <div class="quota" id="quota" style="display:none">
    <span id="quota-text">--</span>
    <div class="bar"><div id="quota-bar" style="width:0%"></div></div>
    <span id="quota-pct" class="mono">--</span>
  </div>

  <div class="section">
    <div class="label">素材<span class="hint">推荐≤5 段</span></div>
    <label class="drop" id="drop">
      <p>选视频或照片</p>
      <p class="small">iOS 选多个后会转码 30-90 秒</p>
      <input type="file" id="files" multiple accept="image/*,video/*">
    </label>
    <div id="prep-notice" style="display:none;margin-top:8px;padding:6px 10px;background:#161616;border-radius:6px;font-size:11px;color:#888;text-align:center">iOS 转码中…</div>
    <div class="asset-list" id="assets"></div>
  </div>

  <div class="section">
    <div class="label">标题 · 描述</div>
    <div class="row2">
      <input type="text" id="title" placeholder="BUDAPEST" maxlength="20">
      <textarea id="prompt" placeholder="一句话描述风格（可选）"></textarea>
    </div>
  </div>

  <div class="section">
    <div class="label">参考 vlog<span class="hint">用来抽 BGM（可选）</span></div>
    <div class="ref-list" id="refs"></div>
    <label class="ref-add" style="margin-top:8px">
      <span>+ 添加</span>
      <input type="file" id="ref-file" accept="video/*" style="display:none">
    </label>
  </div>

  <div class="btn-row">
    <button class="btn" id="go" disabled>开始剪片</button>
  </div>

  <div class="section" id="progress-box" style="display:none">
    <div class="progress">
      <div class="pct" id="pct">0%</div>
      <div class="progress-bar"><div id="bar" style="width:0%"></div></div>
      <div class="log" id="log">等待开始…</div>
    </div>
  </div>

  <div class="section" id="result-box" style="display:none">
    <div class="result">
      <div class="label" style="margin-bottom:8px">完成</div>
      <video id="result-video" controls playsinline></video>
      <div class="result-btns">
        <button class="btn" id="download">下载</button>
        <button class="btn secondary" id="restart">再剪一个</button>
      </div>
    </div>
  </div>
</div>

<div class="drawer" id="history-drawer">
  <div class="drawer-head">
    <h2>📂 历史任务</h2>
    <button class="close" onclick="closeHistory()">×</button>
  </div>
  <div class="jobs-toolbar">
    <button id="select-all">全选</button>
    <button id="deselect-all">全不选</button>
    <button class="danger" id="batch-del">删除选中</button>
    <span style="color:#888;font-size:12px;margin-left:auto" id="sel-count">已选 0</span>
  </div>
  <div class="jobs-list" id="jobs-list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/vlog-api';
const state = { assets: [], refs: [], refId: null, jobId: null, history: [], sel: new Set() };

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

function fmtSize(n){if(n<1024)return n+'B';if(n<1048576)return (n/1024).toFixed(1)+'KB';if(n<1073741824)return (n/1048576).toFixed(1)+'MB';return (n/1073741824).toFixed(2)+'GB';}
function fmtAgo(ts){const s=Math.floor(Date.now()/1000-ts);if(s<60)return s+'秒前';if(s<3600)return Math.floor(s/60)+'分前';if(s<86400)return Math.floor(s/3600)+'小时前';return Math.floor(s/86400)+'天前';}

async function loadQuota(){
  try{
    const r=await fetch(`${API}/quota`);const q=await r.json();
    const el=document.getElementById('quota');
    el.style.display='flex';
    el.classList.toggle('warn',q.warn&&!q.reject);
    el.classList.toggle('full',q.reject);
    document.getElementById('quota-text').textContent=`💾 ${fmtSize(q.used)} / ${fmtSize(q.limit)}`;
    document.getElementById('quota-bar').style.width=q.pct+'%';
    document.getElementById('quota-pct').textContent=q.pct+'%';
    if(q.warn&&!sessionStorage.warned){toast('磁盘 >80%，建议清理历史');sessionStorage.warned='1';}
  }catch{}
}
loadQuota();setInterval(loadQuota,30000);

function renderAssets(){
  const el=document.getElementById('assets');
  const live=new Set(state.assets.map(a=>a.tmpId));
  el.querySelectorAll('[data-tmp]').forEach(n=>{ if(!live.has(n.dataset.tmp)) n.remove(); });
  for(const a of state.assets){
    let card=el.querySelector(`[data-tmp="${a.tmpId}"]`);
    if(!card){
      card=document.createElement('div');
      card.className='asset';card.dataset.tmp=a.tmpId;
      const icon=a.kind==='video'?'🎬':'🖼️';
      card.innerHTML=`<span class="badge">${icon}</span>`+
        `<div class="del">×</div>`+
        `<div class="retry" style="display:none">↻</div>`+
        `<span class="ph" style="font-size:24px">${icon}</span>`+
        `<div class="pct" style="display:none">⬆ 0%</div>`;
      card.querySelector('.del').onclick=(ev)=>{
        ev.stopPropagation();
        if(a.xhr){try{a.xhr.abort();}catch{}}
        state.assets=state.assets.filter(x=>x.tmpId!==a.tmpId);
        renderAssets();updateBtn();
      };
      card.querySelector('.retry').onclick=(ev)=>{
        ev.stopPropagation();
        if(a._file) uploadAsset(a._file,a);
      };
      el.appendChild(card);
    }
    card.classList.toggle('uploading',!!a.uploading);
    card.classList.toggle('errored',!!a.error);
    const pctEl=card.querySelector('.pct');
    const retryEl=card.querySelector('.retry');
    const delEl=card.querySelector('.del');
    if(a.uploading){
      pctEl.style.display='block';
      pctEl.textContent=`⬆ ${a.progress||0}%`;
      pctEl.style.background='rgba(0,0,0,0.8)';
      delEl.style.display='flex';retryEl.style.display='none';
    }else if(a.error){
      pctEl.style.display='block';
      pctEl.textContent=`❌ ${a.errorMsg||'失败'}`;
      pctEl.style.background='rgba(180,30,30,0.9)';
      delEl.style.display='flex';retryEl.style.display='flex';
    }else{
      pctEl.style.display='none';
      delEl.style.display='flex';retryEl.style.display='none';
    }
    let img=card.querySelector('img');
    const src=a.thumbDataUrl||(a.thumb_url?`${API}${a.thumb_url}`:null);
    if(src && (!img || img.dataset.src!==src)){
      if(img) img.remove();
      img=document.createElement('img');
      img.dataset.src=src;img.src=src;
      img.onerror=()=>{img.style.display='none'};
      card.insertBefore(img,card.querySelector('.pct'));
      const ph=card.querySelector('.ph'); if(ph) ph.style.display='none';
    }
  }
}

function genThumb(file, kind){
  return new Promise(res=>{
    if(kind==='image'){
      const r=new FileReader();
      r.onload=e=>res(e.target.result);r.onerror=()=>res(null);
      r.readAsDataURL(file);
    }else{
      const v=document.createElement('video');
      v.muted=true;v.playsInline=true;v.preload='metadata';
      const u=URL.createObjectURL(file);v.src=u;
      v.onloadeddata=()=>{v.currentTime=Math.min(1,v.duration/2);};
      v.onseeked=()=>{
        const c=document.createElement('canvas');
        c.width=240;c.height=240*(v.videoHeight/v.videoWidth);
        c.getContext('2d').drawImage(v,0,0,c.width,c.height);
        URL.revokeObjectURL(u);
        try{res(c.toDataURL('image/jpeg',0.7));}catch{res(null);}
      };
      v.onerror=()=>{URL.revokeObjectURL(u);res(null);}
      setTimeout(()=>{URL.revokeObjectURL(u);res(null);},3000);
    }
  });
}

function uploadOne(file, asset){
  const fd=new FormData();fd.append('file',file);
  return new Promise((res,rej)=>{
    const x=new XMLHttpRequest();
    asset.xhr=x;asset.lastProgressAt=Date.now();
    x.open('POST',`${API}/upload`);
    x.upload.onprogress=e=>{
      if(e.lengthComputable){
        asset.progress=Math.round(e.loaded/e.total*100);
        asset.lastProgressAt=Date.now();
        renderAssets();
      }
    };
    x.onload=()=>{
      asset.xhr=null;
      if(x.status>=200&&x.status<300){try{res(JSON.parse(x.responseText));}catch(e){rej(e);}}
      else rej(new Error(`HTTP ${x.status}`));
    };
    x.onerror=()=>{asset.xhr=null;rej(new Error('Network'));};
    x.onabort=()=>{asset.xhr=null;rej(new Error('Aborted'));};
    const stallTimer=setInterval(()=>{
      if(!asset.xhr){clearInterval(stallTimer);return;}
      if(Date.now()-asset.lastProgressAt>30000){
        clearInterval(stallTimer);try{x.abort();}catch{}asset.stalled=true;
      }
    },5000);
    x.send(fd);
  });
}

async function uploadAsset(file,asset){
  asset.uploading=true;asset.error=false;asset.stalled=false;asset.progress=0;renderAssets();
  try{
    const result=await uploadOne(file,asset);
    Object.assign(asset,result,{uploading:false,progress:100,error:false});
  }catch(err){
    asset.uploading=false;asset.error=true;
    asset.errorMsg=asset.stalled?'超时':err.message;
    toast(`上传失败: ${file.name}`);
  }
  renderAssets();updateBtn();loadQuota();
}

document.getElementById('files').addEventListener('click',()=>{
  document.getElementById('prep-notice').style.display='block';
  document.getElementById('prep-notice').textContent='⏳ 选好后点完成，iOS 会转码 30-90 秒...';
});
document.getElementById('files').onchange=async(e)=>{
  document.getElementById('prep-notice').style.display='none';
  const files=Array.from(e.target.files);
  if(files.length===0)return;
  toast(`收到 ${files.length} 个文件,开始上传`);
  const placeholders=files.map(f=>({
    tmpId:Math.random().toString(36).slice(2,10),
    kind:f.type.startsWith('video')?'video':'image',
    size:f.size,filename:f.name,uploading:true,progress:0,_file:f
  }));
  state.assets.push(...placeholders);renderAssets();
  const thumbPromises=files.map((f,i)=>genThumb(f,placeholders[i].kind).then(d=>{
    if(d){placeholders[i].thumbDataUrl=d;renderAssets();}
  }));
  const UP_CONC=3;let i=0;
  async function next(){while(i<files.length){const idx=i++;await uploadAsset(files[idx],placeholders[idx]);}}
  await Promise.all(Array(Math.min(UP_CONC,files.length)).fill(0).map(()=>next()));
  await Promise.all(thumbPromises);
  updateBtn();e.target.value='';
};

document.getElementById('ref-file').onchange=async(e)=>{
  const f=e.target.files[0];if(!f)return;
  toast('上传参考视频...');
  const fd=new FormData();fd.append('file',f);fd.append('name',f.name);
  const r=await fetch(`${API}/refs/upload`,{method:'POST',body:fd});
  const ref=await r.json();
  state.refs.push(ref);state.refId=ref.id;renderRefs();
  toast('参考视频已加');e.target.value='';loadQuota();
};

function renderRefs(){
  document.getElementById('refs').innerHTML=state.refs.map(r=>
    `<div class="ref ${state.refId===r.id?'active':''}" data-id="${r.id}">${(r.name||'').slice(0,20)}</div>`
  ).join('');
  document.querySelectorAll('.ref').forEach(el=>el.onclick=()=>{
    state.refId=state.refId===el.dataset.id?null:el.dataset.id;renderRefs();
  });
}

function updateBtn(){
  const ready=state.assets.filter(a=>!a.uploading&&!a.error&&a.id);
  document.getElementById('go').disabled=ready.length<2;
}

document.getElementById('go').onclick=async()=>{
  const ready=state.assets.filter(a=>!a.uploading&&!a.error&&a.id);
  const fd=new FormData();
  fd.append('prompt',document.getElementById('prompt').value);
  fd.append('title',document.getElementById('title').value);
  fd.append('asset_ids',ready.map(a=>a.id).join(','));
  if(state.refId)fd.append('ref_id',state.refId);
  const r=await fetch(`${API}/jobs`,{method:'POST',body:fd});
  if(!r.ok){toast(`失败: ${r.status}`);return;}
  const job=await r.json();
  state.jobId=job.id;localStorage.lastJob=job.id;
  document.getElementById('progress-box').style.display='block';
  document.getElementById('go').style.display='none';
  poll();
};

async function poll(){
  if(!state.jobId)return;
  try{
    const r=await fetch(`${API}/jobs/${state.jobId}`);
    const j=await r.json();
    document.getElementById('pct').textContent=j.progress+'%';
    document.getElementById('bar').style.width=j.progress+'%';
    document.getElementById('log').textContent=(j.logs||[]).slice(-1)[0]||'';
    if(j.status==='done'){
      document.getElementById('progress-box').style.display='none';
      document.getElementById('result-box').style.display='block';
      document.getElementById('result-video').src=`${API}/jobs/${state.jobId}/result`;
      loadQuota();return;
    }
    if(j.status==='error'){
      document.getElementById('log').textContent='❌ '+(j.error||'失败');return;
    }
    setTimeout(poll,1500);
  }catch{setTimeout(poll,3000);}
}

document.getElementById('download').onclick=()=>window.location.href=`${API}/jobs/${state.jobId}/result`;
document.getElementById('restart').onclick=()=>location.reload();

// ----- History drawer -----
async function openHistory(){
  document.getElementById('history-drawer').classList.add('open');
  await refreshHistory();
}
function closeHistory(){document.getElementById('history-drawer').classList.remove('open');}
window.closeHistory=closeHistory;

document.getElementById('open-history').onclick=openHistory;

async function refreshHistory(){
  state.sel.clear();
  const r=await fetch(`${API}/jobs`);
  state.history=await r.json();
  renderHistory();
}

function renderHistory(){
  const el=document.getElementById('jobs-list');
  if(state.history.length===0){
    el.innerHTML='<p style="color:#666;text-align:center;padding:40px 0">还没有任务</p>';return;
  }
  el.innerHTML=state.history.map(j=>{
    const total=fmtSize((j.output_size||0)+(j.asset_size||0));
    const checked=state.sel.has(j.id)?'on':'';
    const thumb=j.has_output?`<img src="${API}/jobs/${j.id}/thumb" onerror="this.style.display='none'">`:`<span>🎬</span>`;
    const dlBtn=j.has_output?`<button onclick="downloadJob('${j.id}')">⬇</button>`:'';
    return `<div class="job-card">
      <div class="check ${checked}" onclick="toggleSel('${j.id}')"></div>
      <div class="thumb">${thumb}</div>
      <div class="info">
        <h4>${j.prompt?j.prompt.slice(0,30):'(无描述)'}</h4>
        <p><span class="status-pill ${j.status}">${j.status}</span>${fmtAgo(j.created_at)} · ${total} · ${j.duration?j.duration.toFixed(0)+'s':'--'}</p>
      </div>
      <div class="actions">${dlBtn}<button onclick="deleteJob('${j.id}')" style="color:#ff8888">×</button></div>
    </div>`;
  }).join('');
  document.getElementById('sel-count').textContent=`已选 ${state.sel.size}`;
}

window.toggleSel=(id)=>{
  if(state.sel.has(id))state.sel.delete(id);else state.sel.add(id);
  renderHistory();
};
window.downloadJob=(id)=>window.open(`${API}/jobs/${id}/result`,'_blank');
window.deleteJob=async(id)=>{
  if(!confirm('确定删除这个任务（含素材和成片）？'))return;
  await fetch(`${API}/jobs/${id}`,{method:'DELETE'});
  toast('已删除');refreshHistory();loadQuota();
};
document.getElementById('select-all').onclick=()=>{state.sel=new Set(state.history.map(j=>j.id));renderHistory();};
document.getElementById('deselect-all').onclick=()=>{state.sel.clear();renderHistory();};
document.getElementById('batch-del').onclick=async()=>{
  if(state.sel.size===0){toast('未选任务');return;}
  if(!confirm(`确定删除 ${state.sel.size} 个任务（含素材和成片）？`))return;
  await fetch(`${API}/jobs/batch_delete`,{method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ids:[...state.sel],keep_assets:false})});
  toast('已批量删除');refreshHistory();loadQuota();
};

// Resume last in-progress job on load
async function resumeLastJob(){
  const id=localStorage.lastJob;if(!id)return;
  try{
    const r=await fetch(`${API}/jobs/${id}`);
    if(!r.ok)return;
    const j=await r.json();
    if(j.status==='running'||j.status==='queued'){
      state.jobId=id;
      document.getElementById('progress-box').style.display='block';
      document.getElementById('go').style.display='none';
      poll();toast('已恢复进行中的任务');
    }
  }catch{}
}
resumeLastJob();

if('serviceWorker' in navigator){navigator.serviceWorker.register('/vlog/sw.js').catch(()=>{});}
</script>
</body>
</html>

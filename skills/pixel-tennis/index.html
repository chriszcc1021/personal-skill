const SPRITE_FW = 128;
const SPRITE_FH = 128;

const ANIMS = {
  idle:      { row: 0, frames: 4, fps: 4,  loop: true,  sheet: 1 },
  run:       { row: 1, frames: 4, fps: 10, loop: true,  sheet: 1 },
  forehand:  { row: 2, frames: 4, fps: 12, loop: false, sheet: 1 },
  backhand:  { row: 3, frames: 4, fps: 12, loop: false, sheet: 1 },
  serve:     { row: 0, frames: 4, fps: 8,  loop: false, sheet: 2 },
  smash:     { row: 1, frames: 4, fps: 10, loop: false, sheet: 2 },
  celebrate: { row: 2, frames: 4, fps: 6,  loop: false, sheet: 2 },
  dejected:  { row: 3, frames: 4, fps: 4,  loop: false, sheet: 2 },
};

class SpriteAnimator {
  constructor(image, image2) {
    this.img = image;
    this.img2 = image2 || image;
    this.current = 'idle';
    this.frame = 0;
    this.timer = 0;
    this.done = false;
  }
  play(name) {
    if (this.current === name && !this.done) return;
    this.current = name;
    this.frame = 0;
    this.timer = 0;
    this.done = false;
  }
  update(dt) {
    const a = ANIMS[this.current];
    if (!a || this.done) return;
    this.timer += dt;
    const spf = 1 / a.fps;
    while (this.timer >= spf) {
      this.timer -= spf;
      this.frame++;
      if (this.frame >= a.frames) {
        if (a.loop) { this.frame = 0; }
        else { this.frame = a.frames - 1; this.done = true; }
      }
    }
  }
  draw(ctx, x, y, scale, flipX) {
    const a = ANIMS[this.current];
    if (!a) return;
    const sx = this.frame * SPRITE_FW;
    const sy = a.row * SPRITE_FH;
    const dw = SPRITE_FW * scale;
    const dh = SPRITE_FH * scale;
    ctx.save();
    ctx.translate(x, y);
    if (flipX) ctx.scale(-1, 1);
    ctx.imageSmoothingEnabled = false;
    const img = (a.sheet === 2) ? this.img2 : this.img;
    ctx.drawImage(img, sx, sy, SPRITE_FW, SPRITE_FH, -dw/2, -dh/2, dw, dh);
    ctx.restore();
  }
}

function resize() {
  const sw = window.innerWidth;
  const sh = window.innerHeight;
  // Use full screen, 9:16 aspect preferred
  const targetRatio = 9 / 16;
  const screenRatio = sw / sh;
  if (screenRatio < targetRatio) {
    W = sw;
    H = sw / targetRatio;
  } else {
    H = sh;
    W = sh * targetRatio;
  }
  W = Math.floor(W);
  H = Math.floor(H);
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  SCALE = W / 360; // base design at 360px wide

  const scoreAreaH = 45 * SCALE;
  const controlH = 80 * SCALE;
  courtTop = scoreAreaH;
  courtBottom = H - controlH;
  courtLeft = 30 * SCALE;
  courtRight = W - 30 * SCALE;
  netY = (courtTop + courtBottom) / 2;
  controlAreaTop = courtBottom + 10 * SCALE;
}

// ─── Audio ───
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;
    switch(type) {
      case 'hit':
        osc.frequency.setValueAtTime(1000, now);
        osc.frequency.exponentialRampToValueAtTime(400, now + 0.12);
        gain.gain.setValueAtTime(0.45, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.12);
        osc.start(now); osc.stop(now + 0.12);
        break;
      case 'hit_back':
        osc.frequency.setValueAtTime(780, now);
        osc.frequency.exponentialRampToValueAtTime(300, now + 0.12);
        gain.gain.setValueAtTime(0.4, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.12);
        osc.start(now); osc.stop(now + 0.12);
        break;
      case 'score':
        osc.type = 'square';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.linearRampToValueAtTime(800, now + 0.15);
        osc.frequency.linearRampToValueAtTime(1200, now + 0.3);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.linearRampToValueAtTime(0.01, now + 0.35);
        osc.start(now); osc.stop(now + 0.35);
        break;
      case 'special':
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(100, now);
        osc.frequency.exponentialRampToValueAtTime(50, now + 0.4);
        gain.gain.setValueAtTime(0.4, now);
        gain.gain.linearRampToValueAtTime(0.01, now + 0.5);
        osc.start(now); osc.stop(now + 0.5);
        break;
      case 'out':
        osc.frequency.setValueAtTime(600, now);
        osc.frequency.exponentialRampToValueAtTime(200, now + 0.2);
        gain.gain.setValueAtTime(0.25, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
        osc.start(now); osc.stop(now + 0.2);
        break;
      case 'net':
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(300, now);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
        osc.start(now); osc.stop(now + 0.15);
        break;
      case 'bounce':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.exponentialRampToValueAtTime(80, now + 0.06);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.06);
        osc.start(now); osc.stop(now + 0.06);
        break;
      case 'serve':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(440, now);
        osc.frequency.exponentialRampToValueAtTime(880, now + 0.08);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.12);
        osc.start(now); osc.stop(now + 0.12);
        break;
      case 'lose_point':
        osc.type = 'square';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.linearRampToValueAtTime(200, now + 0.15);
        osc.frequency.linearRampToValueAtTime(100, now + 0.3);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.linearRampToValueAtTime(0.01, now + 0.35);
        osc.start(now); osc.stop(now + 0.35);
        break;
      case 'win_game':
        osc.type = 'square';
        osc.frequency.setValueAtTime(523, now);
        osc.frequency.setValueAtTime(659, now + 0.1);
        osc.frequency.setValueAtTime(784, now + 0.2);
        osc.frequency.setValueAtTime(1047, now + 0.3);
        gain.gain.setValueAtTime(0.25, now);
        gain.gain.linearRampToValueAtTime(0.01, now + 0.5);
        osc.start(now); osc.stop(now + 0.5);
        break;
      case 'charge':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.linearRampToValueAtTime(600, now + 0.5);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.linearRampToValueAtTime(0.15, now + 0.3);
        gain.gain.linearRampToValueAtTime(0.01, now + 0.5);
        osc.start(now); osc.stop(now + 0.5);
        break;
    }
  } catch(e) {}
}

  if (state === 'menu' || (state === 'gameover' && pointTimer <= 0)) {
    startGame();
    return;
  }
  const t = e.changedTouches[0];
  swipeState = { startX: t.clientX, startY: t.clientY, startTime: Date.now(), active: true };

canvas.addEventListener('touchmove', function(e) {

  if (specialAim.active && window._specialCutscene) {
    const rect = canvas.getBoundingClientRect();
    const tx = (e.touches[0].clientX - rect.left) * (W / rect.width);
    const ty = (e.touches[0].clientY - rect.top) * (H / rect.height);
    // 只在 AI 半场范围内更新准心
    if (ty < netY) {

canvas.addEventListener('touchstart', function(e) {

canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  if (!swipeState.active) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - swipeState.startX;
  const dy = t.clientY - swipeState.startY;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const holdTime = Date.now() - swipeState.startTime;
  swipePower = Math.min(holdTime / 800, 1);

  // Determine shot type from swipe
  let shotType = 'flat';
  if (dist > 15) {
    if (dy < -20) shotType = 'topspin';
    else if (dy > 20) shotType = 'slice';
  }

  // Shot direction from horizontal swipe
  swipeDir = { dx: dist > 10 ? dx / dist : 0, dy: 0 };

  // Double-tap detection = special
  const now = Date.now();
  const isDoubleTap = (now - lastTapTime) < 300;
  lastTapTime = now;

  // Zone Shot (energy>=30) auto-triggers, Special Shot = double-tap + full energy
  player.swinging = 10;
  if (isDoubleTap && energy >= 100) {
    // 满能量双击 → Special Shot
    if (ball.active) {
      pendingHit = {shotType, powerLevel: 'special', frames: 20};
      triggerSpecialShot(shotType);
    }
    // 球不在场则不触发，能量保留
  } else {
    pendingHit = {shotType, powerLevel: 'normal', frames: 20};
    playerHitBall(false, shotType, 'normal');
  }

  swipeState.active = false;
}, { passive: false });

canvas.addEventListener('touchcancel', function(e) {

  swipeState.active = false;
}, { passive: false });

// ─── Game Logic ───
function startGame() {
  playerPoints = 0;
  aiPoints = 0;
  playerGames = 0;
  aiGames = 0;
  energy = 0;
  servingPlayer = true;
  rallyCount = 0;
  gamesPlayed = 0;
  comboCount = 0;
  comboTimer = 0;
  comboScale = 1;
  comboShake = 0;
  comboMilestone = '';
  comboMilestoneTimer = 0;
  startPoint();
}

function startPoint() {
  state = 'ready';
  readyTimer = 90; // 1.5 sec at 60fps
  readyText = 'READY';
  ball.active = false;
  ball.trail = [];
  ball.isSpecial = false;
  ball.isZoneShot = false;
  ball.isSpecialShot = false;
  ball.shotType = 'flat';
  rallyCount = 0;
  comboCount = 0;
  comboTimer = 0;
  window._specialCutscene = null;
  window._specialSlowMo = null;
  window._gameFrozen = false;
  window._zoneEffect = null;
  particles = [];

  // Position players
  const courtCenterX = (courtLeft + courtRight) / 2;
  player.x = courtCenterX;
  player.y = courtBottom - 40 * SCALE;
  player.swinging = 0;
  player.celebrating = 0;
  player.hurt = 0;
  ai.x = courtCenterX;
  ai.y = courtTop + 40 * SCALE;
  ai.swinging = 0;
  ai.celebrating = 0;
  ai.hurt = 0;
  ai.targetX = courtCenterX;
}

function serve() {
  const courtCenterX = (courtLeft + courtRight) / 2;
  ball.active = true;
  ball.bounced = false;
  ball.isSpecial = false;
  ball.isZoneShot = false;
  ball.isSpecialShot = false;

  if (servingPlayer) {
    ball.x = player.x;
    ball.y = player.y - 10 * SCALE;
    ball.z = 5;
    ball.vx = swipeDir.dx * 2.5 * SCALE;
    ball.vy = -5.5 * SCALE;
    ball.vz = 5;
    ball.lastHitBy = 'player';
    ball.shotType = 'flat';
  } else {
    ball.x = ai.x;
    ball.y = ai.y + 10 * SCALE;
    ball.z = 5;
    ball.vx = (Math.random() - 0.5) * 1.5 * SCALE;
    ball.vy = 5.5 * SCALE;
    ball.vz = 5;
    ball.lastHitBy = 'ai';
    ball.shotType = 'flat';
  }
  ball.served = true;
  playSound('serve');
}

function scorePoint(scorer) {
  comboCount = 0;
  comboTimer = 0;
  state = 'point';
  pointTimer = 45;
  shakeFrames = 4;
  pointScale = 2.0;

  if (scorer === 'player') {
    if (playerPoints >= 3 && aiPoints >= 3) {
      // Deuce -> advantage
      playerPoints++;
      if (playerPoints - aiPoints >= 2) {
        playerPoints = 0; aiPoints = 0;
        playerGames++;
        servingPlayer = !servingPlayer;
        gamesPlayed++;
        pointText = '\u2713 GAME!';
        if (gamesPlayed % 2 === 1) pointText += ' \u00b7 CHANGE ENDS';
      } else {
        pointText = '\u2713 ADV';
      }
    } else {
      playerPoints++;
      if (playerPoints >= 4) {
        playerPoints = 0; aiPoints = 0;
        playerGames++;
        servingPlayer = !servingPlayer;
        gamesPlayed++;
        pointText = '\u2713 GAME!';
        if (gamesPlayed % 2 === 1) pointText += ' \u00b7 CHANGE ENDS';
      } else {
        pointText = '\u2713 ' + SCORE_NAMES[playerPoints];
      }
    }
  } else {
    if (playerPoints >= 3 && aiPoints >= 3) {
      aiPoints++;
      if (aiPoints - playerPoints >= 2) {
        playerPoints = 0; aiPoints = 0;
        aiGames++;
        servingPlayer = !servingPlayer;
        gamesPlayed++;
        pointText = '\u2717 GAME';
        if (gamesPlayed % 2 === 1) pointText += ' \u00b7 CHANGE ENDS';
      } else {
        pointText = '\u2717 ADV AI';
      }
    } else {
      aiPoints++;
      if (aiPoints >= 4) {
        playerPoints = 0; aiPoints = 0;
        aiGames++;
        servingPlayer = !servingPlayer;
        gamesPlayed++;
        pointText = '\u2717 GAME';
        if (gamesPlayed % 2 === 1) pointText += ' \u00b7 CHANGE ENDS';
      } else {
        pointText = '\u2717 ' + SCORE_NAMES[aiPoints];
      }
    }
  }

  // Set celebration/hurt reactions
  if (scorer === 'player') {
    player.celebrating = 20;
    ai.hurt = 15;
  } else {
    ai.celebrating = 20;
    player.hurt = 15;
  }
  // Audience bounce on any score
  audience.forEach(a => a.bounce = 8 + Math.floor(Math.random()*4));

  // Play appropriate sound
  if (scorer === 'player') {
    if (pointText.includes('GAME') || pointText.includes('WIN')) playSound('win_game');
    else playSound('score');
  } else {
    playSound('lose_point');
  }

  if (playerGames >= GAMES_TO_WIN) {
    state = 'gameover';
    pointText = '\u2713 YOU WIN!';
    pointTimer = 120;
  } else if (aiGames >= GAMES_TO_WIN) {
    state = 'gameover';
    pointText = 'YOU LOSE';
    pointTimer = 120;
  }
}

function playerHitBall(isSpecial_DEPRECATED, shotType, powerLevel) {
  if (!ball.active) return;
  powerLevel = powerLevel || 'normal';
  shotType = shotType || 'flat';
  const dx = ball.x - player.x;
  const dy = ball.y - player.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const hitRange = 70 * SCALE;

  if (dist < hitRange && ball.z < 45 && ball.lastHitBy !== 'player') {
    // Forehand / backhand based on ball position
    player.facing = dx >= 0 ? 1 : -1;
    player.swinging = 10;
    hitStopFrames = 4;
    hitFx = {x: ball.x, y: ball.y - ball.z * SCALE * 0.5, age: 0, maxAge: 10};
    zoomPunch = 1.5;
    shakeFrames = 6;
    // Hit spark particles
    for (let i = 0; i < 6; i++) {
      particles.push({
        x: ball.x, y: ball.y - ball.z * SCALE * 0.5,
        vx: (Math.random()-0.5) * 6, vy: (Math.random()-0.5) * 6,
        life: 10 + Math.random()*5, maxLife: 15,
        color: Math.random() > 0.5 ? '#FF9800' : '#FFC107'
      });
    }
    rallyCount++;
    energy = Math.min(100, energy + 15);
    ball.lastHitBy = 'player';
    ball.bounced = false;

    // Combo
    comboCount++;
    comboTimer = 180;
    comboScale = 2.0;
    comboShake = 6;
    if (comboCount === 5) { comboMilestone = 'NICE!'; comboMilestoneTimer = 60; }
    else if (comboCount === 10) { comboMilestone = 'AMAZING!'; comboMilestoneTimer = 75; }
    else if (comboCount === 15) { comboMilestone = 'INCREDIBLE!'; comboMilestoneTimer = 90; }
    else if (comboCount === 20) { comboMilestone = 'UNSTOPPABLE!'; comboMilestoneTimer = 90; }

    // Combo sound
    if (comboCount >= 3) {
      try {
        const actx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = actx.createOscillator();
        const gain = actx.createGain();
        osc.connect(gain);
        gain.connect(actx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800 + comboCount * 50, actx.currentTime);
        gain.gain.setValueAtTime(0.15, actx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.08);
        osc.start(actx.currentTime);
        osc.stop(actx.currentTime + 0.08);
      } catch(e) {}
    }

    // Direction from swipe (or keyboard: A/D keys)
    let dirX = swipeDir.dx;
    if (keys['a']) dirX = -0.5;
    else if (keys['d']) dirX = 0.5;
    dirX += (Math.random() - 0.5) * 0.15;
    dirX = Math.max(-0.7, Math.min(0.7, dirX));

    const chargePower = 0.6 + swipePower * 0.6; // 0.6x ~ 1.2x
    const speedMult = Math.min(1 + rallyCount * 0.08, 2.2) * chargePower;

    if (powerLevel === 'zone') {
      // Zone Shot - 狙击球
      // energy already deducted at trigger point
      ball.isZoneShot = true;
      ball.isSpecial = true;
      ball.shotType = shotType;

      // 球速 1.5x
      ball.vx = dirX * 1.5 * SCALE * speedMult * 1.5;
      if (shotType === 'topspin') {
        ball.vy = -5 * SCALE * speedMult * 1.5;
        ball.vz = 6;
      } else if (shotType === 'slice') {
        ball.vy = -5.5 * SCALE * speedMult * 1.5;
        ball.vz = 4;
      } else {
        ball.vy = -6 * SCALE * speedMult * 1.5;
        ball.vz = 4.5;
      }
      ball.z = 3;

      // 演出
      hitStopFrames = 10;
      shakeFrames = 4;
      zoomPunch = 1.2;

      // Zone Shot 视觉标记
      window._zoneEffect = { frames: 40 };
      window._shotLabel = { text: 'ZONE SHOT', frames: 45, color: '#FF5722' };
      window._zoneSlowMo = { frames: 20, skip: 2 }; // 慢动作 0.5x 约 0.3 秒

      playSound('special');
    } else {
      // 普通击球
      ball.isSpecial = false;
      ball.isZoneShot = false;
      ball.isSpecialShot = false;
      ball.shotType = shotType;
      if (shotType === 'topspin') {
        ball.vx = dirX * 1.5 * SCALE * speedMult;
        ball.vy = -5 * SCALE * speedMult;
        ball.vz = 6;
        ball.z = 3;
      } else if (shotType === 'slice') {
        ball.vx = dirX * 1.5 * SCALE * speedMult + (Math.random()-0.5) * 1.5 * SCALE;
        ball.vy = -5.5 * SCALE * speedMult;
        ball.vz = 4;
        ball.z = 3;
      } else {
        ball.vx = dirX * 1.5 * SCALE * speedMult;
        ball.vy = -6 * SCALE * speedMult;
        ball.vz = 4.5;
        ball.z = 3;
      }
      playSound(player.facing >= 0 ? 'hit' : 'hit_back');
    }

    // 回球辅助：预判落点，如果会出界就自动修正
    const predictFrames = Math.abs((netY - ball.y) / (ball.vy || -5));
    const predictX = ball.x + ball.vx * predictFrames;
    if (predictX < courtLeft + 25 * SCALE) {
      ball.vx += (courtLeft + 40 * SCALE - predictX) / predictFrames * 0.8;
    } else if (predictX > courtRight - 25 * SCALE) {
      ball.vx -= (predictX - courtRight + 40 * SCALE) / predictFrames * 0.8;
    }
    // Clamp vx to prevent extreme angles
    const maxVx = 4 * SCALE;
    ball.vx = Math.max(-maxVx, Math.min(maxVx, ball.vx));
  }
}

function triggerSpecialShot(shotType) {
  if (!ball.active) return;
  const dx = ball.x - player.x;
  const dy = ball.y - player.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const hitRange = 70 * SCALE;

  if (dist < hitRange && ball.z < 45 && ball.lastHitBy !== 'player') {
    energy = 0;
    ball.isSpecialShot = true;
    ball.isSpecial = true;
    ball.lastHitBy = 'player';
    ball.bounced = false;

    // 画面冻结演出
    window._shotLabel = { text: '★ SPECIAL SHOT ★', frames: 90, color: '#ffd54f' };
    // 初始化瞄准准心 — 默认对面半场中央
    specialAim.x = (courtLeft + courtRight) / 2;
    specialAim.y = courtTop + (netY - courtTop) * 0.5;
    specialAim.active = true;
    specialAim.confirmed = false;

    window._specialCutscene = {
      phase: 0,
      timer: 0,
      totalFrames: 90,
      playerStartX: player.x,
      playerStartY: player.y,
      shotType: shotType
    };

    window._gameFrozen = true;
    playSound('special');
  } else {
    // 球不在范围内，降级为普通击球
    playerHitBall(false, shotType, 'normal');
  }
}

function aiUpdate() {
  // Track velocity for run animation
  ai.vx = ai.x - (ai.prevX || ai.x);
  ai.vy = ai.y - (ai.prevY || ai.y);
  ai.prevX = ai.x;
  ai.prevY = ai.y;

  if (!ball.active) return;

  // Predict where ball will arrive
  let targetX = ball.x + ball.vx * 10;
  targetX = Math.max(courtLeft + 15 * SCALE, Math.min(courtRight - 15 * SCALE, targetX));

  // Smooth target tracking
  ai.targetX += (targetX - ai.targetX) * 0.1;

  const dx = ai.targetX - ai.x;
  // Special Shot 期间 AI 速度降低 60%
  const aiSpeedMult = (ball.isSpecialShot && ball.lastHitBy === 'player') ? 0.4 : 1;
  const moveSpeed = ai.speed * SCALE * aiSpeedMult;
  if (Math.abs(dx) > 2) {
    ai.x += Math.sign(dx) * Math.min(Math.abs(dx), moveSpeed);
  }

  // Vertical movement to track ball
  let targetY;
  if (ball.vy < 0 && ball.lastHitBy === 'player') {
    // Ball coming toward AI
    targetY = Math.max(courtTop + 20 * SCALE, Math.min(netY - 20 * SCALE, ball.y - 30 * SCALE));
  } else {
    targetY = courtTop + 50 * SCALE;
  }
  const dy = targetY - ai.y;
  if (Math.abs(dy) > 2) {
    ai.y += Math.sign(dy) * Math.min(Math.abs(dy), moveSpeed * 0.7);
  }

  // AI hit ball
  if (ball.lastHitBy === 'player') {
    const bDx = ball.x - ai.x;
    const bDy = ball.y - ai.y;
    const dist = Math.sqrt(bDx * bDx + bDy * bDy);

    const aiHitRange = ball.isSpecialShot ? 12 * SCALE : ball.isZoneShot ? 30 * SCALE : 50 * SCALE;
    if (dist < aiHitRange && ball.z < 35) {
      // Miss chance
      const missRate = ball.isSpecialShot ? 0.75 : ball.isZoneShot ? 0.35 : 0.15;
      if (Math.random() > missRate) {
        ai.swinging = 8;
        hitFx = {x: ball.x, y: ball.y - ball.z * SCALE * 0.5, age: 0, maxAge: 12};
        // AI hit spark particles
        for (let i = 0; i < 6; i++) {
          particles.push({
            x: ball.x, y: ball.y - ball.z * SCALE * 0.5,
            vx: (Math.random()-0.5) * 6, vy: (Math.random()-0.5) * 6,
            life: 10 + Math.random()*5, maxLife: 15,
            color: Math.random() > 0.5 ? '#FF9800' : '#FFC107'
          });
        }
        // AI 接到 Special Shot 后被击退
        if (ball.isSpecialShot) {
          ai.x += (ball.vx > 0 ? 1 : -1) * 60 * SCALE;
        }
        rallyCount++;
        energy = Math.min(100, energy + 5); // rally energy gain
        ball.lastHitBy = 'ai';
        ball.bounced = false;
        ball.isSpecial = false;
        ball.isZoneShot = false;
        ball.isSpecialShot = false;

        const speedMult = Math.min(1 + rallyCount * 0.08, 2.0);
        const aimX = (Math.random() - 0.5) * 1.4;
        // AI picks random shot type
        const aiShots = ['flat','topspin','slice'];
        const aiShot = aiShots[Math.floor(Math.random()*3)];
        ball.shotType = aiShot;
        if (aiShot === 'topspin') {
          ball.vx = aimX * 1.5 * SCALE * speedMult;
          ball.vy = 5 * SCALE * speedMult;
          ball.vz = 6;
        } else if (aiShot === 'slice') {
          ball.vx = aimX * 1.5 * SCALE * speedMult + (Math.random()-0.5) * 1.5 * SCALE;
          ball.vy = 5.5 * SCALE * speedMult;
          ball.vz = 4;
        } else {
          ball.vx = aimX * 1.5 * SCALE * speedMult;
          ball.vy = 6 * SCALE * speedMult;
          ball.vz = 4.5;
        }
        ball.z = 3;
        playSound('hit');
      }
    }
  }

  // Perspective-based boundary clamp for AI
  {
    const courtWidth = courtRight - courtLeft;
    const perspRatio = 0.7;
    const t = (ai.y - courtTop) / (courtBottom - courtTop);
    const leftBound = courtLeft + courtWidth * (1-perspRatio)/2 * (1-t);
    const rightBound = courtRight - courtWidth * (1-perspRatio)/2 * (1-t);
    ai.x = Math.max(leftBound + 5*SCALE, Math.min(rightBound - 5*SCALE, ai.x));
  }
  ai.y = Math.max(courtTop + 15 * SCALE, Math.min(netY - 10 * SCALE, ai.y));

  // AI dust particles
  if (frameCount % 4 === 0) {
    const speed = Math.sqrt((ai.vx||0)**2 + (ai.vy||0)**2);
    if (speed > 1) {
      for (let i = 0; i < 2; i++) {
        particles.push({x: ai.x + (Math.random()-0.5)*8, y: ai.y + 12*SCALE, vx: -ai.vx*0.3 + (Math.random()-0.5)*1.5, vy: Math.random()*0.5, life: 8, maxLife: 8});
      }
    }
  }
}

function updateBall() {
  if (!ball.active) return;

  ball.x += ball.vx;
  ball.y += ball.vy;
  ball.z += ball.vz;
  ball.vz -= 0.18; // gravity

  // Trail
  ball.trail.push({ x: ball.x, y: ball.y - ball.z * SCALE * 1.2, special: ball.isSpecial, isZoneShot: ball.isZoneShot, isSpecialShot: ball.isSpecialShot, shotType: ball.shotType });
  const maxTrail = ball.isSpecialShot ? 25 : 8;
  while (ball.trail.length > maxTrail) ball.trail.shift();

  // Bounce on ground
  if (ball.z <= 0) {
    ball.z = 0;
    if (!ball.bounced) {
      ball.bounced = true;
      ball.bounceFrame = 4;
      playSound('bounce');
      // Shot type bounce differences
      if (ball.shotType === 'topspin') {
        ball.vz = Math.abs(ball.vz) * 0.7;
        ball.vy *= 1.2;
      } else if (ball.shotType === 'slice') {
        ball.vz = Math.abs(ball.vz) * 0.5;
        ball.vx += (Math.random()-0.5) * 1 * SCALE;
      } else {
        ball.vz = Math.abs(ball.vz) * 0.5;
      }
      // Dust particles on bounce
      particles.push(...Array.from({length: 6}, () => ({
        x: ball.x, y: ball.y,
        vx: (Math.random()-0.5) * 3, vy: (Math.random()-0.5) * 2,
        life: 12 + Math.random() * 8, maxLife: 20
      })));
      // Check if in court
      if (ball.x < courtLeft || ball.x > courtRight) {
        // Out of bounds on side
        outOfBounds();
        return;
      }
      // Check if ball landed in correct half (must land in opponent's court)
      if (ball.lastHitBy === 'player' && ball.y > netY) {
        // Player's shot landed in own half = player loses point
        scorePoint('ai');
        ball.active = false;
        playSound('out');
        return;
      } else if (ball.lastHitBy === 'ai' && ball.y < netY) {
        // AI's shot landed in own half = AI loses point
        scorePoint('player');
        ball.active = false;
        playSound('out');
        return;
      }
    } else {
      // Second bounce = point over
      if (ball.lastHitBy === 'player') {
        // Ball in AI's side and bounced twice
        if (ball.y < netY) {
          scorePoint('player');
        } else {
          scorePoint('ai');
        }
      } else {
        if (ball.y > netY) {
          scorePoint('ai');
        } else {
          scorePoint('player');
        }
      }
      ball.active = false;
      return;
    }
  }

  // Net collision - check if ball crosses net at low height
  const prevY = ball.y - ball.vy;
  if ((prevY < netY && ball.y >= netY) || (prevY > netY && ball.y <= netY)) {
    if (ball.z < 6 && !ball.bounced) {
      // Hit the net
      ball.active = false;
      playSound('net');
      if (ball.lastHitBy === 'player') {
        scorePoint('ai');
      } else {
        scorePoint('player');
      }
      return;
    }
  }

  // Side boundary check during flight (not just on bounce)
  if (ball.x < courtLeft - 20 * SCALE || ball.x > courtRight + 20 * SCALE) {
    outOfBounds();
    return;
  }

  // Out top/bottom
  if (ball.y < courtTop - 120 * SCALE || ball.y > courtBottom + 120 * SCALE) {
    outOfBounds();
  }
}

function outOfBounds() {
  ball.active = false;
  playSound('out');
  if (ball.lastHitBy === 'player') {
    scorePoint('ai');
  } else {
    scorePoint('player');
  }
}

function updatePlayer() {
  // Track velocity for run animation
  player.vx = player.x - (player.prevX || player.x);
  player.vy = player.y - (player.prevY || player.y);
  player.prevX = player.x;
  player.prevY = player.y;

  // Keyboard manual movement (WASD) overrides auto-chase
  const kbMove = keys['w'] || keys['a'] || keys['s'] || keys['d'];
  if (kbMove) {
    if (keys['a']) { player.x -= player.speed * SCALE; player.facing = -1; }
    if (keys['d']) { player.x += player.speed * SCALE; player.facing = 1; }
    if (keys['w']) player.y -= player.speed * SCALE * 0.7;
    if (keys['s']) player.y += player.speed * SCALE * 0.7;
  } else {
    // Auto-chase ball (like AI)
    if (!ball.active) {
      // No ball → return to center baseline
      const centerX = (courtLeft + courtRight) / 2;
      const baseY = courtBottom - 30 * SCALE;
      const dx = centerX - player.x;
      const dy = baseY - player.y;
      if (Math.abs(dx) > 2) player.x += Math.sign(dx) * Math.min(Math.abs(dx), player.speed * SCALE);
      if (Math.abs(dy) > 2) player.y += Math.sign(dy) * Math.min(Math.abs(dy), player.speed * SCALE * 0.7);
    } else {
      // Chase ball - faster and better prediction
      let targetX = ball.x + ball.vx * 12;
      let targetY;
      if (ball.vy > 0 && ball.lastHitBy === 'ai') {
        targetY = Math.min(courtBottom - 10 * SCALE, ball.y + ball.vy * 8);
      } else {
        targetY = courtBottom - 50 * SCALE;
      }
      targetX = Math.max(courtLeft + 10 * SCALE, Math.min(courtRight - 10 * SCALE, targetX));
      targetY = Math.max(netY + 15 * SCALE, Math.min(courtBottom - 5 * SCALE, targetY));
      const dx = targetX - player.x;
      const dy = targetY - player.y;
      const chaseSpeed = player.speed * 1.3; // faster than before
      if (Math.abs(dx) > 2) player.x += Math.sign(dx) * Math.min(Math.abs(dx), chaseSpeed * SCALE);
      if (Math.abs(dy) > 2) player.y += Math.sign(dy) * Math.min(Math.abs(dy), chaseSpeed * SCALE * 0.7);
    }
  }
  // Perspective-based boundary clamp (court is trapezoid)
  {
    const courtWidth = courtRight - courtLeft;
    const perspRatio = 0.7;
    const t = (player.y - courtTop) / (courtBottom - courtTop);
    const leftBound = courtLeft + courtWidth * (1-perspRatio)/2 * (1-t);
    const rightBound = courtRight - courtWidth * (1-perspRatio)/2 * (1-t);
    player.x = Math.max(leftBound + 5*SCALE, Math.min(rightBound - 5*SCALE, player.x));
  }
  player.y = Math.max(netY + 15 * SCALE, Math.min(courtBottom - 5 * SCALE, player.y));
  if (player.swinging > 0) player.swinging--;

  // Dust particles when moving
  if (frameCount % 4 === 0) {
    const speed = Math.sqrt((player.vx||0)**2 + (player.vy||0)**2);
    if (speed > 1) {
      for (let i = 0; i < 2; i++) {
        particles.push({x: player.x + (Math.random()-0.5)*8, y: player.y + 12*SCALE, vx: -player.vx*0.3 + (Math.random()-0.5)*1.5, vy: Math.random()*0.5, life: 8, maxLife: 8});
      }
    }
  }
}

// ─── Drawing ───
function drawCourt() {
  const courtWidth = courtRight - courtLeft;
  const courtHeight = courtBottom - courtTop;
  const perspRatio = 0.7;

  const nearL = courtLeft;
  const nearR = courtRight;
  const farL = courtLeft + courtWidth * (1 - perspRatio) / 2;
  const farR = courtRight - courtWidth * (1 - perspRatio) / 2;

  function perspX(y) {
    const t = (y - courtTop) / courtHeight;
    return {
      left: farL + (nearL - farL) * t,
      right: farR + (nearR - farR) * t
    };
  }

  // 1. 全屏深绿底色
  ctx.fillStyle = '#14421e';
  ctx.fillRect(0, 0, W, H);
  // 浅绿围栏区域（梯形 + margin）
  ctx.fillStyle = '#2d7d46';
  const margin = 15 * SCALE;
  ctx.beginPath();
  ctx.moveTo(farL - margin, courtTop - margin);
  ctx.lineTo(farR + margin, courtTop - margin);
  ctx.lineTo(nearR + margin, courtBottom + margin);
  ctx.lineTo(nearL - margin, courtBottom + margin);
  ctx.closePath();
  ctx.fill();

  // 2. 蓝色球场（梯形）
  ctx.fillStyle = '#1a5276';
  ctx.beginPath();
  ctx.moveTo(farL, courtTop);
  ctx.lineTo(farR, courtTop);
  ctx.lineTo(nearR, courtBottom);
  ctx.lineTo(nearL, courtBottom);
  ctx.closePath();
  ctx.fill();

  // 3. 棋盘格纹理
  const gridH = 6 * SCALE;
  for (let y = courtTop; y < courtBottom; y += gridH) {
    const p = perspX(y);
    const p2 = perspX(Math.min(y + gridH, courtBottom));
    const rowWidth = p.right - p.left;
    const gridW = 6 * SCALE;
    const cols = Math.ceil(rowWidth / gridW);
    const rowIdx = Math.floor((y - courtTop) / gridH);
    for (let c = 0; c < cols; c++) {
      if ((rowIdx + c) % 2 === 0) continue;
      const x1 = p.left + (c / cols) * (p.right - p.left);
      const x2 = p.left + ((c + 1) / cols) * (p.right - p.left);
      const x3 = p2.left + ((c + 1) / cols) * (p2.right - p2.left);
      const x4 = p2.left + (c / cols) * (p2.right - p2.left);
      ctx.fillStyle = 'rgba(255,255,255,0.04)';
      ctx.beginPath();
      ctx.moveTo(x1, y);
      ctx.lineTo(x2, y);
      ctx.lineTo(x3, y + gridH);
      ctx.lineTo(x4, y + gridH);
      ctx.closePath();
      ctx.fill();
    }
  }

  // 4. 球场线
  ctx.strokeStyle = 'rgba(255,255,255,0.95)';
  ctx.lineWidth = 2.5 * SCALE;
  ctx.lineCap = 'round';

  // 边线（梯形四边）
  ctx.beginPath();
  ctx.moveTo(farL, courtTop);
  ctx.lineTo(farR, courtTop);
  ctx.lineTo(nearR, courtBottom);
  ctx.lineTo(nearL, courtBottom);
  ctx.closePath();
  ctx.stroke();

  // 发球线
  const serviceTopY = courtTop + courtHeight * 0.28;
  const serviceBotY = courtTop + courtHeight * 0.72;
  const pST = perspX(serviceTopY);
  const pSB = perspX(serviceBotY);
  ctx.beginPath();
  ctx.moveTo(pST.left, serviceTopY);
  ctx.lineTo(pST.right, serviceTopY);
  ctx.moveTo(pSB.left, serviceBotY);
  ctx.lineTo(pSB.right, serviceBotY);
  ctx.stroke();

  // 中线（发球区中间竖线）
  const pTop = perspX(serviceTopY);
  const pNet = perspX(netY);
  const pBot = perspX(serviceBotY);
  ctx.beginPath();
  ctx.moveTo((pTop.left + pTop.right) / 2, serviceTopY);
  ctx.lineTo((pNet.left + pNet.right) / 2, netY);
  ctx.moveTo((pNet.left + pNet.right) / 2, netY);
  ctx.lineTo((pBot.left + pBot.right) / 2, serviceBotY);
  ctx.stroke();

  // 中心标记
  const pCT = perspX(courtTop);
  const pCB = perspX(courtBottom);
  ctx.beginPath();
  ctx.moveTo((pCT.left + pCT.right) / 2, courtTop);
  ctx.lineTo((pCT.left + pCT.right) / 2, courtTop + 5 * SCALE);
  ctx.moveTo((pCB.left + pCB.right) / 2, courtBottom);
  ctx.lineTo((pCB.left + pCB.right) / 2, courtBottom - 5 * SCALE);
  ctx.stroke();

  // 5. 球网（有高度的 3D 透视效果）
  const pN = perspX(netY);
  const netH = 16 * SCALE; // 网的高度
  const netTop = netY - netH;
  const postW = 5 * SCALE;
  const postH = netH + 4 * SCALE;

  // 网的阴影（投射到球场上）
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.beginPath();
  ctx.moveTo(pN.left - 4*SCALE, netY + 3*SCALE);
  ctx.lineTo(pN.right + 4*SCALE, netY + 3*SCALE);
  ctx.lineTo(pN.right + 8*SCALE, netY + 8*SCALE);
  ctx.lineTo(pN.left - 2*SCALE, netY + 8*SCALE);
  ctx.closePath();
  ctx.fill();

  // 网面背景（深色半透明）
  ctx.fillStyle = 'rgba(20,20,20,0.6)';
  ctx.beginPath();
  ctx.moveTo(pN.left, netTop);
  ctx.lineTo(pN.right, netTop);
  ctx.lineTo(pN.right, netY);
  ctx.lineTo(pN.left, netY);
  ctx.closePath();
  ctx.fill();

  // 网格竖线（密集）
  ctx.strokeStyle = 'rgba(80,80,80,0.6)';
  ctx.lineWidth = 0.8 * SCALE;
  for (let x = pN.left; x <= pN.right; x += 4 * SCALE) {
    ctx.beginPath();
    ctx.moveTo(x, netTop + 2*SCALE);
    ctx.lineTo(x, netY);
    ctx.stroke();
  }
  // 网格横线
  ctx.strokeStyle = 'rgba(80,80,80,0.5)';
  ctx.lineWidth = 0.6 * SCALE;
  const hLines = 3;
  for (let i = 1; i <= hLines; i++) {
    const ly = netTop + (netH * i / (hLines + 1));
    ctx.beginPath();
    ctx.moveTo(pN.left, ly);
    ctx.lineTo(pN.right, ly);
    ctx.stroke();
  }

  // 白色顶带（网最上面的粗白线）
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 2.5 * SCALE;
  ctx.beginPath();
  ctx.moveTo(pN.left - 2*SCALE, netTop);
  ctx.lineTo(pN.right + 2*SCALE, netTop);
  ctx.stroke();

  // 网柱（左右两端，有高度）
  ctx.fillStyle = '#555555';
  ctx.fillRect(pN.left - postW, netTop - 3*SCALE, postW, postH + 3*SCALE);
  ctx.fillRect(pN.right, netTop - 3*SCALE, postW, postH + 3*SCALE);
  // 网柱顶部高光
  ctx.fillStyle = '#888888';
  ctx.fillRect(pN.left - postW, netTop - 3*SCALE, postW, 2*SCALE);
  ctx.fillRect(pN.right, netTop - 3*SCALE, postW, 2*SCALE);

  // 6. 场景装饰
  // 围栏（球场四周深色线条）
  ctx.strokeStyle = '#1a4a2a';
  ctx.lineWidth = 3 * SCALE;
  const fenceM = margin + 5 * SCALE;
  ctx.beginPath();
  ctx.moveTo(farL - fenceM, courtTop - fenceM);
  ctx.lineTo(farR + fenceM, courtTop - fenceM);
  ctx.lineTo(nearR + fenceM, courtBottom + fenceM);
  ctx.lineTo(nearL - fenceM, courtBottom + fenceM);
  ctx.closePath();
  ctx.stroke();
  // 围栏竖线
  ctx.strokeStyle = 'rgba(20,60,30,0.5)';
  ctx.lineWidth = 1 * SCALE;
  for (let i = 0; i <= 12; i++) {
    const t = i / 12;
    const topX = (farL - fenceM) + t * ((farR + fenceM) - (farL - fenceM));
    const botX = (nearL - fenceM) + t * ((nearR + fenceM) - (nearL - fenceM));
    ctx.beginPath();
    ctx.moveTo(topX, courtTop - fenceM);
    ctx.lineTo(botX, courtBottom + fenceM);
    ctx.stroke();
  }

  // 树木（更大更明显）
  function drawTree(tx, ty, size) {
    // 树干
    ctx.fillStyle = '#5D4037';
    ctx.fillRect(tx - 3*SCALE, ty, 6*SCALE, size*0.6*SCALE);
    // 树冠
    ctx.fillStyle = '#1B5E20';
    ctx.beginPath();
    ctx.arc(tx + 4*SCALE, ty + 2*SCALE, size*0.7*SCALE, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#2E7D32';
    ctx.beginPath();
    ctx.arc(tx, ty - size*0.2*SCALE, size*0.8*SCALE, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#388E3C';
    ctx.beginPath();
    ctx.arc(tx - 4*SCALE, ty + 3*SCALE, size*0.6*SCALE, 0, Math.PI*2);
    ctx.fill();
  }
  // 远端两棵大树
  drawTree(farL - fenceM - 8*SCALE, courtTop + 10*SCALE, 22);
  drawTree(farR + fenceM + 8*SCALE, courtTop + 5*SCALE, 25);
  // 近端小树
  drawTree(nearL - fenceM - 5*SCALE, courtBottom - 40*SCALE, 18);
  drawTree(nearR + fenceM + 5*SCALE, courtBottom - 30*SCALE, 20);
  // 中间补充树
  drawTree(farL - fenceM - 12*SCALE, courtTop + courtHeight*0.3, 16);
  drawTree(farR + fenceM + 12*SCALE, courtTop + courtHeight*0.25, 18);

  // 树叶阴影投射到球场
  ctx.fillStyle = 'rgba(0,30,0,0.08)';
  ctx.beginPath();
  ctx.ellipse(farL + 15*SCALE, courtTop + 25*SCALE, 25*SCALE, 35*SCALE, 0.3, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(farR - 10*SCALE, courtTop + 30*SCALE, 20*SCALE, 30*SCALE, -0.2, 0, Math.PI*2);
  ctx.fill();

  // 裁判椅（远端左侧）
  ctx.fillStyle = '#4E342E';
  ctx.fillRect(farL - fenceM - 4*SCALE, courtTop + courtHeight*0.45, 6*SCALE, 10*SCALE);
  ctx.fillStyle = '#3E2723';
  ctx.fillRect(farL - fenceM - 5*SCALE, courtTop + courtHeight*0.43, 8*SCALE, 4*SCALE);

  // 球车（远端右侧小方块 + 球）
  ctx.fillStyle = '#455A64';
  ctx.fillRect(farR + fenceM + 2*SCALE, courtTop + courtHeight*0.4, 8*SCALE, 6*SCALE);
  ctx.fillStyle = '#C8E6C9';
  for (let b = 0; b < 3; b++) {
    ctx.beginPath();
    ctx.arc(farR + fenceM + (4 + b*2.5)*SCALE, courtTop + courtHeight*0.39, 1.5*SCALE, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawPixelCharacter(x, y, isPlayer, swinging, facing) {
  const anim = isPlayer ? playerAnim : aiAnim;
  const charScale = SCALE * 0.55;
  const char = isPlayer ? player : ai;

  const moving = isPlayer
    ? (Math.abs(player.vx || 0) > 0.5 || Math.abs(player.vy || 0) > 0.5)
    : (Math.abs(ai.vx || 0) > 0.5 || Math.abs(ai.vy || 0) > 0.5);

  if (swinging > 0) {
    anim.play(facing >= 0 ? 'forehand' : 'backhand');
  } else if (moving) {
    anim.play('run');
  } else {
    anim.play('idle');
  }

  // Squash & stretch
  let scaleX = 1, scaleY = 1;
  if (swinging > 8) {
    scaleX = 1.15; scaleY = 0.9;
  } else if (swinging > 4) {
    scaleX = 0.95; scaleY = 1.05;
  } else {
    // Idle breathing
    scaleY = 1 + Math.sin(frameCount * 0.08) * 0.02;
  }

  // Celebrating - bouncy
  let drawY = y;
  if (char.celebrating > 0) {
    scaleY = char.celebrating % 4 < 2 ? 1.1 : 0.9;
    scaleX = char.celebrating % 4 < 2 ? 0.9 : 1.1;
  }
  // Hurt - slump down
  if (char.hurt > 0) {
    drawY = y + 3 * SCALE;
  }

  // Charge shake
  let shakeOffX = 0, shakeOffY = 0;
  if (isPlayer && swipeState.active && swipePower > 0.3) {
    const intensity = swipePower * 2 * SCALE;
    shakeOffX = (Math.random() - 0.5) * intensity;
    shakeOffY = (Math.random() - 0.5) * intensity;
  }

  // Shadow - more natural, shrinks when swinging ("jumping")
  const shadowShrink = swinging > 8 ? 0.7 : 1;
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(x, y + 20 * SCALE, 18 * SCALE * shadowShrink, 6 * SCALE * shadowShrink, 0, 0, Math.PI * 2);
  ctx.fill();

  // Jump offset for smash / Special Shot
  const jumpY = (isPlayer && player.specialY) ? (player.specialY - player.y) :
                (isPlayer && player.jumpOffset) ? player.jumpOffset : 0;
  if (isPlayer && player.jumpOffset) {
    player.jumpOffset *= 0.9;
    if (Math.abs(player.jumpOffset) < 1) player.jumpOffset = 0;
  }
  const specialScl = (isPlayer && player.specialScale > 1) ? player.specialScale : 1;
  if (isPlayer && player.specialScale && !window._specialCutscene) {
    player.specialScale += (1 - player.specialScale) * 0.1;
    if (Math.abs(player.specialScale - 1) < 0.02) player.specialScale = 0;
  }

  // Draw sprite with squash/stretch
  ctx.save();
  ctx.translate(x + shakeOffX, drawY - 15 * SCALE + shakeOffY + jumpY);
  ctx.scale(scaleX * specialScl, scaleY * specialScl);
  anim.draw(ctx, 0, 0, charScale, facing < 0);
  ctx.restore();
}

function drawBall() {
  if (!ball.active) return;

  // Trail
  for (let i = 0; i < ball.trail.length; i++) {
    const t = ball.trail[i];
    const alpha = (i / ball.trail.length) * 0.7;
    let trailColor;
    if (t.isSpecialShot) {
      const hue = (frameCount * 8 + i * 20) % 360;
      trailColor = `hsla(${hue}, 100%, 60%, ${alpha})`;
    } else if (t.isZoneShot) trailColor = `rgba(255, 87, 34, ${alpha})`;
    else if (t.special) trailColor = `rgba(255, 230, 0, ${alpha})`;
    else if (t.shotType === 'topspin') trailColor = `rgba(244, 67, 54, ${alpha})`;
    else if (t.shotType === 'slice') trailColor = `rgba(33, 150, 243, ${alpha})`;
    else if (t.shotType === 'flat') trailColor = `rgba(186, 104, 200, ${alpha})`;
    else trailColor = `rgba(255, 255, 255, ${alpha})`;
    ctx.fillStyle = trailColor;
    const size = (3 + i * 0.3) * SCALE;
    ctx.beginPath();
    ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
    ctx.fill();
  }

  // Shadow
  const shadowScale = Math.max(0.2, 1 - ball.z / 25);
  ctx.fillStyle = `rgba(0,0,0,${0.35 * shadowScale})`;
  ctx.beginPath();
  ctx.ellipse(ball.x, ball.y + 2 * SCALE, (5 + ball.z * 0.3) * SCALE * shadowScale, 2 * SCALE * shadowScale, 0, 0, Math.PI * 2);
  ctx.fill();

  // Ball with motion stretch + bounce squash
  const ballDrawY = ball.y - ball.z * SCALE * 1.2;
  const ballRadius = 6 * SCALE;
  const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
  const stretch = Math.min(speed / (3 * SCALE), 2.5);
  const angle = Math.atan2(ball.vy, ball.vx);

  // Bounce squash
  let scaleX = 1, scaleY = 1;
  if (ball.bounceFrame > 0) {
    const t = ball.bounceFrame / 4;
    scaleY = 0.6 + 0.4 * (1 - t);
    scaleX = 1.3 - 0.3 * (1 - t);
  }

  if (ball.isSpecialShot) {
    const hue = (frameCount * 3) % 360;
    // 子弹时间期间球体放大 + 额外光晕
    if (window._specialSlowMo && window._specialSlowMo.frames > 0) {
      const glowR = ballRadius * 5;
      const glow = ctx.createRadialGradient(ball.x, ballDrawY, ballRadius * 0.5, ball.x, ballDrawY, glowR);
      glow.addColorStop(0, `hsla(${hue}, 100%, 70%, 0.35)`);
      glow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(ball.x, ballDrawY, glowR, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = `hsla(${hue}, 100%, 60%, 0.4)`;
    ctx.beginPath();
    ctx.arc(ball.x, ballDrawY, ballRadius * 3.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = `hsl(${hue}, 100%, 60%)`;
  } else if (ball.isZoneShot) {
    ctx.fillStyle = 'rgba(255, 87, 34, 0.3)';
    ctx.beginPath();
    ctx.arc(ball.x, ballDrawY, ballRadius * 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#FF5722';
  } else if (ball.isSpecial) {
    ctx.fillStyle = 'rgba(255, 230, 0, 0.3)';
    ctx.beginPath();
    ctx.arc(ball.x, ballDrawY, ballRadius * 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffe600';
  } else {
    ctx.fillStyle = '#e8f5e9';
  }
  ctx.save();
  ctx.translate(ball.x, ballDrawY);
  ctx.rotate(angle);
  ctx.scale(scaleX, scaleY);
  ctx.beginPath();
  ctx.ellipse(0, 0, ballRadius * (1 + stretch * 0.3), ballRadius / (1 + stretch * 0.15), 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath();
  ctx.arc(ball.x - ballRadius * 0.3, ballDrawY - ballRadius * 0.3, ballRadius * 0.35, 0, Math.PI * 2);
  ctx.fill();
}

function drawUI() {
  // Score background
  ctx.fillStyle = '#0d1b2a';
  ctx.fillRect(0, 0, W, courtTop);

  // Title
  ctx.fillStyle = '#4fc3f7';
  ctx.font = `bold ${14 * SCALE}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('PIXEL TENNIS', W / 2, 12 * SCALE);

  // Score display
  const scoreY = 26 * SCALE;
  ctx.font = `bold ${16 * SCALE}px monospace`;

  // Player score - green
  ctx.fillStyle = '#4CAF50';
  ctx.textAlign = 'left';
  ctx.fillText('YOU', 15 * SCALE, scoreY);

  ctx.fillStyle = '#4CAF50';
  const pScore = playerPoints >= 4 ? 'AD' :
                 (playerPoints >= 3 && aiPoints >= 3 && playerPoints === aiPoints) ? '40' :
                 SCORE_NAMES[Math.min(playerPoints, 3)];
  ctx.fillText(pScore, 60 * SCALE, scoreY);

  // Games - set indicators as blocks
  ctx.textAlign = 'center';
  const setBlockSize = 8 * SCALE;
  const setBlockGap = 4 * SCALE;
  const setBaseY = scoreY - 6 * SCALE;
  // Player sets (left of center)
  for (let i = 0; i < GAMES_TO_WIN; i++) {
    const bx = W / 2 - 50 * SCALE + i * (setBlockSize + setBlockGap);
    if (i < playerGames) {
      ctx.fillStyle = '#4CAF50';
      ctx.fillRect(bx, setBaseY, setBlockSize, setBlockSize);
    } else {
      ctx.strokeStyle = '#4CAF50';
      ctx.lineWidth = 1;
      ctx.strokeRect(bx, setBaseY, setBlockSize, setBlockSize);
    }
  }
  // Divider
  ctx.fillStyle = '#ffd54f';
  ctx.font = `bold ${16 * SCALE}px monospace`;
  ctx.fillText('-', W / 2, scoreY);
  // AI sets (right of center)
  for (let i = 0; i < GAMES_TO_WIN; i++) {
    const bx = W / 2 + 18 * SCALE + i * (setBlockSize + setBlockGap);
    if (i < aiGames) {
      ctx.fillStyle = '#FF3D2E';
      ctx.fillRect(bx, setBaseY, setBlockSize, setBlockSize);
    } else {
      ctx.strokeStyle = '#FF3D2E';
      ctx.lineWidth = 1;
      ctx.strokeRect(bx, setBaseY, setBlockSize, setBlockSize);
    }
  }

  // AI score - red
  ctx.font = `bold ${16 * SCALE}px monospace`;
  ctx.fillStyle = '#FF3D2E';
  ctx.textAlign = 'right';
  ctx.fillText('CPU', W - 15 * SCALE, scoreY);

  ctx.fillStyle = '#FF3D2E';
  const aScore = aiPoints >= 4 ? 'AD' :
                 (aiPoints >= 3 && playerPoints >= 3 && aiPoints === playerPoints) ? '40' :
                 SCORE_NAMES[Math.min(aiPoints, 3)];
  ctx.fillText(aScore, W - 60 * SCALE, scoreY);

  // Energy bar - pixel segmented (bigger, more visible)
  const barY = 38 * SCALE;
  const barX = 15 * SCALE;
  const totalBarW = W - 30 * SCALE;
  const barH = 8 * SCALE;
  const segCount = 10;
  const segGap = 2 * SCALE;
  const segW = (totalBarW - segGap * (segCount - 1)) / segCount;
  const filledSegs = Math.floor(energy / 10);
  const fullFlash = energy >= 100 && Math.floor(frameCount / 15) % 2 === 0;
  const zoneReady = energy >= 30;

  // Label
  ctx.font = `${7 * SCALE}px monospace`;
  ctx.textAlign = 'left';
  ctx.fillStyle = energy >= 100 ? '#ffd54f' : '#666';
  ctx.fillText(energy >= 100 ? '★ SPECIAL' : '', barX, barY - 2 * SCALE);

  for (let i = 0; i < segCount; i++) {
    const sx = barX + i * (segW + segGap);
    // Background segment
    ctx.fillStyle = '#1a3a1a';
    ctx.fillRect(sx, barY, segW, barH);
    // Filled segment
    if (i < filledSegs) {
      if (energy >= 100) {
        ctx.fillStyle = fullFlash ? '#FFE082' : '#ffd54f';
      } else if (i >= 7) {
        ctx.fillStyle = '#FF9800';
      } else {
        ctx.fillStyle = '#4caf50';
      }
      ctx.fillRect(sx, barY, segW, barH);
    }
    // Border
    ctx.strokeStyle = '#4fc3f7';
    ctx.lineWidth = 1;
    ctx.strokeRect(sx, barY, segW, barH);
  }

  if (energy >= 100) {
    ctx.fillStyle = fullFlash ? '#FFE082' : '#ffd54f';
    ctx.font = `bold ${8 * SCALE}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText('★ SPECIAL READY ★', W / 2, barY + barH + 10 * SCALE);
  }

  // Serve indicator
  ctx.fillStyle = '#aaaaaa';
  ctx.font = `${9 * SCALE}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(servingPlayer ? '● YOUR SERVE' : '● CPU SERVE', W / 2, 75 * SCALE);
}

function drawControls() {
  // Minimal control hints at bottom
  ctx.fillStyle = 'rgba(13, 27, 42, 0.5)';
  ctx.fillRect(0, controlAreaTop - 5 * SCALE, W, H - controlAreaTop + 5 * SCALE);

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Charge indicator when holding
  if (swipeState.active && swipePower > 0.1) {
    const barW = W * 0.5;
    const barH = 8 * SCALE;
    const barX = W / 2 - barW / 2;
    const barY = controlAreaTop + 10 * SCALE;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(barX, barY, barW, barH);
    const pct = swipePower;
    const col = pct < 0.5 ? '#4CAF50' : pct < 0.8 ? '#FFC107' : '#FF3D2E';
    ctx.fillStyle = col;
    ctx.fillRect(barX, barY, barW * pct, barH);
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1;
    ctx.strokeRect(barX, barY, barW, barH);
    ctx.fillStyle = '#ffffff';
    ctx.font = `bold ${8 * SCALE}px monospace`;
    ctx.fillText('CHARGING...', W / 2, barY + barH + 10 * SCALE);
  }

  // Hint text - pixel style
  const hintY = H - 35 * SCALE;
  ctx.fillStyle = '#666666';
  ctx.font = `${10 * SCALE}px monospace`;
  ctx.fillText('↑ SPIN · ↓ SLICE · TAP HIT · ×2 SPECIAL', W / 2, hintY);

  if (energy >= 100) {
    ctx.fillStyle = '#ffd54f';
    ctx.font = `bold ${10 * SCALE}px monospace`;
    const blink = Math.sin(Date.now() / 200) > 0;
    if (blink) ctx.fillText('★ DOUBLE-TAP FOR SPECIAL SHOT ★', W / 2, hintY + 14 * SCALE);
  } else if (energy >= 30) {
    ctx.fillStyle = '#FF9800';
    ctx.font = `bold ${10 * SCALE}px monospace`;
    ctx.fillText('ZONE SHOT READY', W / 2, hintY + 14 * SCALE);
  }
  ctx.textBaseline = 'alphabetic';
}

function drawOverlay() {
  if (state === 'menu') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = '#4fc3f7';
    ctx.font = `bold ${28 * SCALE}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText('PIXEL', W / 2, H * 0.3);
    ctx.fillText('TENNIS', W / 2, H * 0.3 + 35 * SCALE);

    // Pixel tennis ball icon
    ctx.fillStyle = '#e8f5e9';
    ctx.beginPath();
    ctx.arc(W / 2, H * 0.45, 12 * SCALE, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#ffffff';
    ctx.font = `${14 * SCALE}px monospace`;
    const blink = Math.sin(Date.now() / 300) > 0;
    if (blink) {
      ctx.fillText('TAP TO START', W / 2, H * 0.58);
    }

    ctx.fillStyle = '#888';
    ctx.font = `${10 * SCALE}px monospace`;
    ctx.fillText('Swipe to hit • Auto-move', W / 2, H * 0.66);
    ctx.fillText('First to 3 games wins!', W / 2, H * 0.70);
    return;
  }

  if (state === 'ready') {
    const progress = 1 - readyTimer / 90;
    const txt = progress < 0.6 ? 'READY' : 'GO!';
    const baseSize = progress < 0.6 ? 30 : 40;
    ctx.fillStyle = `rgba(0,0,0,${0.3})`;
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = progress < 0.6 ? '#4fc3f7' : '#ffd54f';
    // Elastic scale bounce
    const phaseProgress = progress < 0.6 ? progress / 0.6 : (progress - 0.6) / 0.4;
    const elasticScale = 1 + Math.exp(-phaseProgress * 5) * Math.cos(phaseProgress * 8) * 0.8;
    const size = baseSize * elasticScale;
    ctx.font = `bold ${size * SCALE}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(txt, W / 2, H * 0.45);
    // Serve indicator with float
    if (progress > 0.3) {
      const floatY = Math.sin(Date.now() / 300) * 3 * SCALE;
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.font = `bold ${16 * SCALE}px monospace`;
      ctx.fillText(servingPlayer ? 'YOUR SERVE' : 'CPU SERVE', W / 2, H * 0.53 + floatY);
    }
  }

  if (state === 'point' || state === 'gameover') {
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = pointText.startsWith('\u2713') ? '#4CAF50' : pointText.startsWith('\u2717') ? '#FF3D2E' : '#ffd54f';
    const ps = Math.max(1.0, pointScale);
    ctx.save();
    ctx.translate(W / 2, H * 0.43);
    ctx.scale(ps, ps);
    ctx.font = `bold ${32 * SCALE}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(pointText, 0, 0);
    ctx.restore();

    if (state === 'gameover' && pointTimer < 120) {
      ctx.fillStyle = '#ffffff';
      ctx.font = `${14 * SCALE}px monospace`;
      const blink = Math.sin(Date.now() / 300) > 0;
      if (blink) ctx.fillText('TAP TO RESTART', W / 2, H * 0.55);
    }
  }

  // Flash effect
  if (flashAlpha > 0) {
    ctx.fillStyle = `rgba(255, 255, 255, ${flashAlpha})`;
    ctx.fillRect(0, 0, W, H);
  }
}

// ─── Main Loop ───
function update() {
  if (state === 'ready') {
    readyTimer--;
    if (readyTimer <= 0) {
      state = 'playing';
      serve();
    }
    return;
  }

  if (state === 'point') {
    pointTimer--;
    if (pointTimer <= 0) {
      startPoint();
    }
    return;
  }

  if (state === 'gameover') {
    pointTimer--;
    return;
  }

  if (state !== 'playing') return;

  // Combo timers
  if (comboTimer > 0) comboTimer--;
  if (comboTimer === 0 && comboCount > 0) comboCount = 0;
  if (comboScale > 1) comboScale += (1 - comboScale) * 0.15;
  if (comboScale < 1.02) comboScale = 1;
  if (comboShake > 0) comboShake--;
  if (comboMilestoneTimer > 0) comboMilestoneTimer--;

  // Special Shot cutscene
  if (window._specialCutscene) {
    const sc = window._specialCutscene;
    
    // Phase 0-1 自动推进，蓄力等待冻结，confirmed 后继续
    if (sc.phase < 2 || specialAim.confirmed) {
      sc.timer++;
    }
    
    if (sc.timer < 20) {
      sc.phase = 0;
    } else if (sc.timer < 50) {
      sc.phase = 1;
      const t = (sc.timer - 20) / 30;
      player.specialY = sc.playerStartY - 120 * SCALE * Math.sin(t * Math.PI);
      player.specialScale = 1 + t * 1.0;
    } else if (!specialAim.confirmed) {
      // 蓄力等待阶段 - 角色悬浮在空中，等待玩家点击落点
      sc.phase = 1;
      player.specialY = sc.playerStartY - 120 * SCALE;
      player.specialScale = 2.0;
      if (!sc.chargeTimer) sc.chargeTimer = 0;
      sc.chargeTimer++;
      sc.timer = 49; // 保持在 49，confirmed 后推进到 50
      // 超时 5 秒（300帧）自动确认
      if (sc.chargeTimer > 300) {
        specialAim.confirmed = true;
      }
    } else if (sc.timer < 65) {
      sc.phase = 2;
      player.swinging = 10;
    } else if (sc.timer < 70) {
      sc.phase = 3;
      if (sc.timer === 65) {
        // 根据准心位置反算球速，让球精确落在准心处
        const vz0 = 5;
        const z0 = 10;
        const g = 0.18;
        // 计算球从 z0 飞起到落地的总帧数
        // z = z0 + vz0*t - 0.5*g*t^2, 解 z=0
        // 0.5*g*t^2 - vz0*t - z0 = 0
        // t = (vz0 + sqrt(vz0^2 + 2*g*z0)) / g
        const flightFrames = (vz0 + Math.sqrt(vz0*vz0 + 2*g*z0)) / g;
        
        // 球需要在 flightFrames 帧内从 ball.x/y 飞到 specialAim.x/y
        ball.vx = (specialAim.x - ball.x) / flightFrames;
        ball.vy = (specialAim.y - ball.y) / flightFrames;
        ball.vz = vz0;
        ball.z = z0;
        ball.shotType = 'special';
        ball.isSpecialShot = true;
        ball.isSpecial = true;
        ball.lastHitBy = 'player';
        ball.bounced = false;
        
        hitStopFrames = 8;
        shakeFrames = 10;
        zoomPunch = 2.5;
        flashAlpha = 0.8;
        
        // 启动子弹时间
        window._specialSlowMo = { frames: 200, skip: 3 };
        
        // 不需要回球辅助，已精确计算落点
        const maxVx = 4 * SCALE;
        ball.vx = Math.max(-maxVx, Math.min(maxVx, ball.vx));
        
        specialAim.active = false;
      }
    } else {
      // 演出结束，但慢动作继续
      window._specialCutscene = null;
      window._gameFrozen = false;
      player.specialY = 0;
      player.specialScale = 0;
      specialAim.active = false;
      // _specialSlowMo 保持，由 gameLoop 处理
    }
    
    if (window._specialCutscene && window._specialCutscene.phase < 3) return;
  }

  // Update charge power while touch is held
  if (swipeState.active) {
    swipePower = Math.min((Date.now() - swipeState.startTime) / 800, 1);
  }

  // Hit stop freeze
  if (hitStopFrames > 0) { hitStopFrames--; return; }

  // Buffered hit input - retry if ball comes into range
  if (pendingHit && pendingHit.frames > 0) {
    pendingHit.frames--;
    if (ball.active && ball.lastHitBy !== 'player') {
      const dx = ball.x - player.x;
      const dy = ball.y - player.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 70 * SCALE && ball.z < 45) {
        player.swinging = 10;
        if (pendingHit.powerLevel === 'special') {
          triggerSpecialShot(pendingHit.shotType);
        } else {
          playerHitBall(false, pendingHit.shotType, pendingHit.powerLevel);
        }
        pendingHit = null;
      }
    }
    if (pendingHit && pendingHit.frames <= 0) pendingHit = null;
  }

  playerAnim.update(1/60);
  aiAnim.update(1/60);


  updatePlayer();
  updateBall();
  aiUpdate();

  // Hit FX age
  if (hitFx) { hitFx.age++; if (hitFx.age > hitFx.maxAge) hitFx = null; }
  // Zoom punch decay
  if (zoomPunch > 0) zoomPunch *= 0.8;
  if (zoomPunch < 0.01) zoomPunch = 0;
  // Flash decay
  if (flashAlpha > 0) flashAlpha -= 0.08;
  if (shakeFrames > 0) shakeFrames--;
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  // Screen shake
  let shakeX = 0, shakeY = 0;
  if (shakeFrames > 0) {
    shakeX = (Math.random() - 0.5) * 10 * SCALE;
    shakeY = (Math.random() - 0.5) * 10 * SCALE;
  }

  ctx.save();
  // Zoom punch (camera micro-zoom on hit)
  if (zoomPunch > 0) {
    const s = 1 - zoomPunch * 0.05;
    ctx.translate(W/2, H/2);
    ctx.scale(s, s);
    ctx.translate(-W/2, -H/2);
  }
  ctx.translate(shakeX, shakeY);

  drawCourt();

  // Charge glow under player
  if (swipeState.active && swipePower > 0.1) {
    const glow = swipePower;
    ctx.fillStyle = `rgba(33, 150, 243, ${glow * 0.25})`;
    ctx.beginPath();
    ctx.ellipse(player.x, player.y + 8 * SCALE, (20 + glow * 15) * SCALE, (8 + glow * 5) * SCALE, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = `rgba(33, 150, 243, ${glow * 0.5})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Draw characters - with serve jump offset
  let aiDrawY = ai.y;
  let playerDrawY = player.y;
  // Serve jump: character rises before ball is served
  if (!ball.served && state === 'ready' && readyTimer < 45) {
    const jumpProgress = 1 - (readyTimer / 45);
    const jumpArc = Math.sin(jumpProgress * Math.PI);
    if (servingPlayer) {
      playerDrawY = player.y - jumpArc * 5 * SCALE;
    } else {
      aiDrawY = ai.y - jumpArc * 5 * SCALE;
    }
  }
  drawPixelCharacter(ai.x, aiDrawY, false, ai.swinging, 0);
  drawPixelCharacter(player.x, playerDrawY, true, player.swinging, player.facing);

  drawBall();

  // Dust particles
  // Dark overlay for special/zone hit stop
  if (hitStopFrames > 0 && (ball.isSpecial || ball.isZoneShot || ball.isSpecialShot)) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, H);
  }

  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.life--;
    const alpha = p.life / p.maxLife;
    if (p.color) {
      // Parse hex color for rgba
      ctx.fillStyle = p.color;
      ctx.globalAlpha = alpha;
      ctx.fillRect(p.x - 2*SCALE, p.y - 2*SCALE, 4*SCALE, 4*SCALE);
      ctx.globalAlpha = 1;
    } else {
      ctx.fillStyle = `rgba(200,200,200,${alpha * 0.6})`;
      ctx.fillRect(p.x - 1.5*SCALE, p.y - 1.5*SCALE, 3*SCALE, 3*SCALE);
    }
  });
  particles = particles.filter(p => p.life > 0);

  // Hit burst FX
  if (hitFx) {
    const p = hitFx.age / hitFx.maxAge;
    const r = (15 + p * 30) * SCALE;
    const alpha = (1 - p) * 0.9;
    // White flash at center
    if (p < 0.3) {
      ctx.fillStyle = `rgba(255,255,255,${(1-p/0.3)*0.5})`;
      ctx.beginPath();
      ctx.arc(hitFx.x, hitFx.y, r * 0.5, 0, Math.PI * 2);
      ctx.fill();
    }
    // Expanding ring
    ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
    ctx.lineWidth = (4 - p * 3) * SCALE;
    ctx.beginPath();
    ctx.arc(hitFx.x, hitFx.y, r, 0, Math.PI * 2);
    ctx.stroke();
    // 6 radial lines (more impact)
    ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.8})`;
    ctx.lineWidth = 2.5 * SCALE;
    for (let a = 0; a < 6; a++) {
      const angle = a * Math.PI / 3;
      const inner = r * 0.3;
      const outer = r * 1.4;
      ctx.beginPath();
      ctx.moveTo(hitFx.x + Math.cos(angle) * inner, hitFx.y + Math.sin(angle) * inner);
      ctx.lineTo(hitFx.x + Math.cos(angle) * outer, hitFx.y + Math.sin(angle) * outer);
      ctx.stroke();
    }
  }

  ctx.restore();

  drawUI();

  // Combo counter
  if (comboCount >= 2) {
    ctx.save();
    const cx = W - 40 * SCALE;
    const cy = H * 0.3;
    const shakeX2 = comboShake > 0 ? (Math.random()-0.5) * 4 * SCALE : 0;
    const shakeY2 = comboShake > 0 ? (Math.random()-0.5) * 4 * SCALE : 0;
    ctx.translate(cx + shakeX2, cy + shakeY2);
    ctx.scale(comboScale, comboScale);
    let color;
    if (comboCount >= 10) {
      color = frameCount % 8 < 4 ? '#FF1744' : '#FF5252';
    } else if (comboCount >= 7) {
      color = '#FF9800';
    } else if (comboCount >= 4) {
      color = '#FFC107';
    } else {
      color = '#FFFFFF';
    }
    if (comboCount >= 5) {
      const glowR = (20 + comboCount * 2) * SCALE;
      const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, glowR);
      glow.addColorStop(0, 'rgba(255,255,255,0.15)');
      glow.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = glow;
      ctx.fillRect(-glowR, -glowR, glowR*2, glowR*2);
    }
    ctx.font = `bold ${8 * SCALE}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillText('HIT', 0, -12 * SCALE);
    ctx.font = `bold ${22 * SCALE}px monospace`;
    ctx.fillStyle = color;
    ctx.strokeStyle = 'rgba(0,0,0,0.6)';
    ctx.lineWidth = 2 * SCALE;
    ctx.strokeText('x' + comboCount, 0, 8 * SCALE);
    ctx.fillText('x' + comboCount, 0, 8 * SCALE);
    ctx.restore();
  }

  // Milestone text
  if (comboMilestoneTimer > 0 && comboMilestone) {
    ctx.save();
    const mt = comboMilestoneTimer;
    const maxT = 90;
    const progress = 1 - mt / maxT;
    const mScale = progress < 0.2 ? 1 + (1-progress/0.2) * 1.5 : 1;
    const alpha = mt > 15 ? 1 : mt / 15;
    ctx.translate(W/2, H * 0.45);
    ctx.scale(mScale, mScale);
    ctx.globalAlpha = alpha;
    let mColor = '#FFD54F';
    if (comboMilestone === 'INCREDIBLE!' || comboMilestone === 'UNSTOPPABLE!') mColor = '#FF5722';
    ctx.font = `bold ${24 * SCALE}px monospace`;
    ctx.textAlign = 'center';
    ctx.strokeStyle = 'rgba(0,0,0,0.7)';
    ctx.lineWidth = 3 * SCALE;
    ctx.strokeText(comboMilestone, 0, 0);
    ctx.fillStyle = mColor;
    ctx.fillText(comboMilestone, 0, 0);
    ctx.globalAlpha = 1;
    ctx.restore();
    if (progress < 0.1) {
      ctx.fillStyle = `rgba(255,255,255,${(1-progress/0.1) * 0.2})`;
      ctx.fillRect(0, 0, W, H);
    }
  }

  drawControls();
  drawOverlay();

  // Special Shot 子弹时间效果（落点预测 + 暗角 + trail 虚线）
  if (window._specialSlowMo && window._specialSlowMo.frames > 0 && ball.active && ball.isSpecialShot) {
    // 落点预测十字准心
    let px = ball.x, py = ball.y, pz = ball.z, pvx = ball.vx, pvy = ball.vy, pvz = ball.vz;
    for (let i = 0; i < 200; i++) {
      px += pvx; py += pvy; pz += pvz; pvz -= 0.18;
      if (pz <= 0) {
        const flash = Math.floor(frameCount / 6) % 2 === 0;
        ctx.strokeStyle = flash ? 'rgba(255,255,255,0.8)' : 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 1.5 * SCALE;
        const cr = 12 * SCALE;
        ctx.beginPath();
        ctx.moveTo(px - cr, py); ctx.lineTo(px + cr, py);
        ctx.moveTo(px, py - cr); ctx.lineTo(px, py + cr);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(px, py, cr * 0.7, 0, Math.PI * 2);
        ctx.stroke();
        break;
      }
    }
    // trail 虚线轨迹点
    if (ball.trail) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ball.trail.forEach((t, i) => {
        if (i % 2 === 0) {
          ctx.beginPath();
          ctx.arc(t.x, t.y, 2 * SCALE, 0, Math.PI * 2);
          ctx.fill();
        }
      });
    }
  }
  // 子弹时间暗角
  if (window._specialSlowMo && window._specialSlowMo.frames > 0) {
    const vigAlpha = 0.5;
    const grad = ctx.createRadialGradient(W/2, H/2, W*0.25, W/2, H/2, W*0.7);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, `rgba(0,0,0,${vigAlpha})`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

  // Special Shot 演出
  if (window._specialCutscene) {
    const sc = window._specialCutscene;
    
    const vigAlpha = Math.min(sc.timer / 20, 1) * 0.8;
    const grad = ctx.createRadialGradient(W/2, H/2, W*0.2, W/2, H/2, W*0.7);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, `rgba(0,0,0,${vigAlpha})`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    
    if (sc.phase >= 1 && sc.phase <= 2) {
      const pulseT = ((sc.timer - 20) % 15) / 15;
      const pulseR = pulseT * W * 0.6;
      const pulseAlpha = (1 - pulseT) * 0.3;
      ctx.strokeStyle = `rgba(100, 50, 255, ${pulseAlpha})`;
      ctx.lineWidth = 4 * SCALE;
      ctx.beginPath();
      ctx.arc(player.x, player.specialY || player.y, pulseR, 0, Math.PI * 2);
      ctx.stroke();
    }

    // 蓄力特效 - 角色闪白 + 能量粒子聚拢 + 光环
    if (window._specialCutscene && window._specialCutscene.phase === 1 && !specialAim.confirmed) {
      const sc2 = window._specialCutscene;
      const ct = sc2.chargeTimer || 0;
      const chargeY = player.specialY || player.y;
      
      // 角色闪白（每 8 帧交替）
      if (ct % 8 < 4) {
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.fillRect(player.x - 20*SCALE, chargeY - 30*SCALE, 40*SCALE, 50*SCALE);
      }
      
      // 脉冲光环
      const chPulseR = (25 + Math.sin(ct * 0.1) * 8) * SCALE;
      const chPulseAlpha = 0.2 + Math.sin(ct * 0.15) * 0.1;
      ctx.strokeStyle = `rgba(100, 200, 255, ${chPulseAlpha})`;
      ctx.lineWidth = 3 * SCALE;
      ctx.beginPath();
      ctx.arc(player.x, chargeY, chPulseR, 0, Math.PI * 2);
      ctx.stroke();
      
      // 能量粒子向角色聚拢（8个粒子绕圈）
      for (let i = 0; i < 8; i++) {
        const angle = (ct * 0.05 + i * Math.PI / 4) % (Math.PI * 2);
        const dist = 40 * SCALE * (1 - (ct % 30) / 30);
        const px = player.x + Math.cos(angle) * dist;
        const py = chargeY + Math.sin(angle) * dist;
        const pAlpha = 0.3 + (1 - dist / (40*SCALE)) * 0.5;
        ctx.fillStyle = `rgba(150, 220, 255, ${pAlpha})`;
        ctx.beginPath();
        ctx.arc(px, py, 2.5 * SCALE, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // 瞄准准心
    if (specialAim.active) {
      ctx.save();
      const ax = specialAim.x;
      const ay = specialAim.y;
      const flash = Math.floor(frameCount / 8) % 2 === 0;
      ctx.strokeStyle = flash ? 'rgba(255,255,255,0.9)' : 'rgba(255,255,255,0.4)';
      ctx.lineWidth = 2 * SCALE;
      ctx.beginPath();
      ctx.arc(ax, ay, 18 * SCALE, 0, Math.PI * 2);
      ctx.stroke();
      const cr = 25 * SCALE;
      ctx.beginPath();
      ctx.moveTo(ax - cr, ay); ctx.lineTo(ax - 8*SCALE, ay);
      ctx.moveTo(ax + 8*SCALE, ay); ctx.lineTo(ax + cr, ay);
      ctx.moveTo(ax, ay - cr); ctx.lineTo(ax, ay - 8*SCALE);
      ctx.moveTo(ax, ay + 8*SCALE); ctx.lineTo(ax, ay + cr);
      ctx.stroke();
      ctx.fillStyle = flash ? '#FF1744' : '#FF5252';
      ctx.beginPath();
      ctx.arc(ax, ay, 3 * SCALE, 0, Math.PI * 2);
      ctx.fill();
      ctx.font = `bold ${9 * SCALE}px monospace`;
      ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.fillText(!specialAim.confirmed ? 'TAP TO CONFIRM' : 'LOCKED', ax, ay + 35 * SCALE);
      ctx.restore();
    }
  }

  // Zone Shot 效果
  if (window._zoneEffect && window._zoneEffect.frames > 0) {
    window._zoneEffect.frames--;
    const t = window._zoneEffect.frames / 40;
    
    const vigAlpha = t * 0.6;
    const grad = ctx.createRadialGradient(W/2, H/2, W*0.3, W/2, H/2, W*0.8);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, `rgba(0,0,0,${vigAlpha})`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    
    if (window._zoneEffect.frames % 3 === 0) {
      for (let i = 0; i < 3; i++) {
        particles.push({
          x: Math.random() * W,
          y: Math.random() * H,
          vx: (Math.random()-0.5) * 2,
          vy: Math.random() * 2 + 1,
          life: 15,
          maxLife: 15,
          color: Math.random() > 0.5 ? '#FF5722' : '#FF9800'
        });
      }
    }
  }
}

function gameLoop() {
  frameCount++;
  // Bounce frame decay
  if (ball.bounceFrame > 0) ball.bounceFrame--;
  // Point scale decay
  if (pointScale > 1.0) { pointScale *= 0.9; if (pointScale < 1.02) pointScale = 1.0; }
  // Celebrating/hurt decay
  if (player.celebrating > 0) player.celebrating--;
  if (player.hurt > 0) player.hurt--;
  if (ai.celebrating > 0) ai.celebrating--;
  if (ai.hurt > 0) ai.hurt--;
  // Audience bounce decay
  audience.forEach(a => { if (a.bounce > 0) a.bounce--; });

  // Special Shot 子弹时间
  if (window._specialSlowMo && window._specialSlowMo.frames > 0) {
    window._specialSlowMo.frames--;
    if (frameCount % window._specialSlowMo.skip !== 0) {
      draw();
      if (window._shotLabel && window._shotLabel.frames > 0) {
        window._shotLabel.frames--;
        const sl = window._shotLabel;
        const t = sl.frames / 45;
        const scale = t > 0.8 ? 1 + (1-t)/0.2 * 0.5 : 1;
        ctx.save();
        ctx.translate(W/2, H * 0.35);
        ctx.scale(scale, scale);
        ctx.font = `bold ${18 * SCALE}px monospace`;
        ctx.textAlign = 'center';
        ctx.fillStyle = sl.color;
        ctx.globalAlpha = Math.min(t * 3, 1);
        ctx.fillText(sl.text, 0, 0);
        ctx.globalAlpha = 1;
        ctx.restore();
        if (sl.frames <= 0) window._shotLabel = null;
      }
      requestAnimationFrame(gameLoop);
      return;
    }
    // 球落地或不活跃时结束慢动作
    if (!ball.active) window._specialSlowMo = null;
  }

  // Zone Shot bullet time / freeze
  if (window._zoneSlowMo && window._zoneSlowMo.frames > 0) {
    window._zoneSlowMo.frames--;
    if (frameCount % window._zoneSlowMo.skip !== 0) {
      draw();
      // Shot label overlay
      if (window._shotLabel && window._shotLabel.frames > 0) {
        window._shotLabel.frames--;
        const sl = window._shotLabel;
        const t = sl.frames / 45;
        const scale = t > 0.8 ? 1 + (1-t)/0.2 * 0.5 : 1;
        ctx.save();
        ctx.translate(W/2, H * 0.35);
        ctx.scale(scale, scale);
        ctx.font = `bold ${18 * SCALE}px monospace`;
        ctx.textAlign = 'center';
        ctx.fillStyle = sl.color;
        ctx.globalAlpha = Math.min(t * 3, 1);
        ctx.fillText(sl.text, 0, 0);
        ctx.globalAlpha = 1;
        ctx.restore();
        if (sl.frames <= 0) window._shotLabel = null;
      }
      requestAnimationFrame(gameLoop);
      return;
    }
    update();
  } else if (!window._gameFrozen) {
    update();
  } else if (window._specialCutscene) {
    update();
  }
  draw();

  // Shot label overlay
  if (window._shotLabel && window._shotLabel.frames > 0) {
    window._shotLabel.frames--;
    const sl = window._shotLabel;
    const t = sl.frames / 45;
    const scale = t > 0.8 ? 1 + (1-t)/0.2 * 0.5 : 1; // pop in
    ctx.save();
    ctx.translate(W/2, H * 0.35);
    ctx.scale(scale, scale);
    ctx.font = `bold ${18 * SCALE}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillStyle = sl.color;
    ctx.globalAlpha = Math.min(t * 3, 1);
    ctx.fillText(sl.text, 0, 0);
    ctx.globalAlpha = 1;
    ctx.restore();
    if (sl.frames <= 0) window._shotLabel = null;
  }

  requestAnimationFrame(gameLoop);
}

// Prevent default touch behaviors
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('gesturechange', e => e.preventDefault());
document.addEventListener('gestureend', e => e.preventDefault());

// Start
resize();
state = 'menu';
gameLoop();

</script>
</body>

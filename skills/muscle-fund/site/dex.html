<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>肌肉基金 · 6 鱼 10 档进化图鉴</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Fredoka:wght@500;700;900&family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-ocean:#4DD0E1;--bg-deep:#00838F;--bg-sand:#F9E4A6;
    --ink:#0D3B4F;--sponge:#FFD600;--patrick:#FF80AB;--coral:#FF7043;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{font-family:"Fredoka","Noto Sans SC",system-ui,sans-serif;color:var(--ink);background:linear-gradient(180deg,#80E0E8 0%,var(--bg-ocean) 50%,#26B5C6 100%);min-height:100vh}
  .wrap{max-width:1400px;margin:0 auto;padding:32px 20px 80px}
  h1{font-family:"Luckiest Guy",sans-serif;font-size:clamp(40px,7vw,72px);text-align:center;letter-spacing:.05em;color:#fff;text-shadow:4px 4px 0 var(--ink),8px 8px 0 var(--sponge);margin-bottom:8px}
  .sub{text-align:center;font-size:14px;opacity:.7;margin-bottom:32px;font-weight:700}
  .legend{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:32px;font-size:11px;font-weight:700;letter-spacing:.05em}
  .legend span{background:rgba(255,255,255,.6);padding:6px 12px;border-radius:99px;border:2px solid var(--ink)}
  .fish-section{background:rgba(255,255,255,.5);border-radius:24px;border:3px solid var(--ink);box-shadow:6px 6px 0 var(--ink);margin-bottom:36px;padding:24px 20px;backdrop-filter:blur(8px)}
  .fish-head{display:flex;align-items:baseline;gap:14px;margin-bottom:16px;flex-wrap:wrap;border-bottom:2px dashed var(--ink);padding-bottom:14px}
  .fish-name{font-family:"Luckiest Guy",sans-serif;font-size:32px;letter-spacing:.05em;color:var(--ink)}
  .fish-cn{font-family:"ZCOOL KuaiLe","Luckiest Guy",sans-serif;font-size:24px;color:var(--coral)}
  .fish-owner{font-family:"Fredoka",sans-serif;font-size:14px;background:var(--sponge);padding:4px 12px;border-radius:99px;border:2px solid var(--ink);font-weight:900}
  .levels{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px}
  .lv{background:#fff;border:2px solid var(--ink);border-radius:14px;padding:8px 6px 12px;text-align:center;position:relative;transition:transform .2s;overflow:hidden}
  .lv:hover{transform:translateY(-4px) scale(1.05);box-shadow:4px 4px 0 var(--ink);z-index:2}
  .lv .badge{position:absolute;top:6px;left:6px;background:var(--ink);color:#fff;font-family:"Luckiest Guy",sans-serif;font-size:11px;letter-spacing:.05em;padding:3px 8px;border-radius:99px;z-index:2}
  .lv .days{position:absolute;top:6px;right:6px;font-size:9px;background:var(--sponge);border:1.5px solid var(--ink);font-weight:900;padding:2px 6px;border-radius:99px;letter-spacing:.02em}
  .lv img{width:100%;height:130px;object-fit:contain;display:block}
  .lv .desc{font-size:11px;font-weight:700;color:var(--ink);margin-top:4px;line-height:1.3}
  /* lv9 金光 */
  .lv.lv9{background:linear-gradient(135deg,#FFF6D0,#FFE17A);border-color:#B8860B}
  .lv.lv9 .badge{background:#B8860B}
  .footer{text-align:center;font-size:12px;opacity:.6;margin-top:32px;font-weight:700}
  .footer a{color:var(--ink)}
  @media (max-width:600px){
    .levels{grid-template-columns:repeat(auto-fit,minmax(95px,1fr));gap:8px}
    .lv img{height:100px}
    .fish-name{font-size:24px}
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>🐟 FISH DEX 🐟</h1>
  <div class="sub">肌肉基金 · 6 鱼 × 10 档进化图鉴</div>

  <div class="legend">
    <span>lv0 新人</span>
    <span>lv1 哑铃</span>
    <span>lv2 起步</span>
    <span>lv3 初成</span>
    <span>lv4 健身者</span>
    <span>lv5 半壮</span>
    <span>lv6 明显</span>
    <span>lv7 健美</span>
    <span>lv8 大佬</span>
    <span>lv9 神级</span>
  </div>

  <div id="grid"></div>

  <div class="footer">
    一个月 22 工作日全勤 = lv9 满级 · 主站 <a href="../muscle-fund/">/muscle-fund/</a>
  </div>
</div>

<script>
const FISH = [
  {id:'cool',    en:'COOL',    cn:'酷酷鱼', owner:'张鱼哥'},
  {id:'dopey',   en:'DOPEY',   cn:'呆呆鱼', owner:'P神'},
  {id:'working', en:'WORKING', cn:'打工鱼', owner:'查尔斯'},
  {id:'dazed',   en:'DAZED',   cn:'慒慒鱼', owner:'狗哥'},
  {id:'flat',    en:'FLAT',    cn:'躺平鱼', owner:'Shadow'},
  {id:'limp',    en:'LIMP',    cn:'瘫瘫鱼', owner:'YK'},
];
const LV_DAYS = ['0','1-2','3-4','5-7','8-10','11-13','14-16','17-19','20-21','22+'];
const LV_DESC = ['新人喘气','拿哑铃','起步','初成','健身者','半壮','明显肌肉','健美','大肌肉','金光皇冠'];

const grid = document.getElementById('grid');
FISH.forEach(f=>{
  const sec = document.createElement('section');
  sec.className = 'fish-section';
  let levels = '';
  for(let i=0;i<10;i++){
    levels += `
      <div class="lv ${i===9?'lv9':''}">
        <div class="badge">lv${i}</div>
        <div class="days">${LV_DAYS[i]}天</div>
        <img src="../muscle-fund/assets/fish-levels/${f.id}/lv${i}.png" alt="${f.cn} lv${i}" loading="lazy">
        <div class="desc">${LV_DESC[i]}</div>
      </div>`;
  }
  sec.innerHTML = `
    <div class="fish-head">
      <div class="fish-name">${f.en}</div>
      <div class="fish-cn">${f.cn}</div>
      <div class="fish-owner">${f.owner}</div>
    </div>
    <div class="levels">${levels}</div>
  `;
  grid.appendChild(sec);
});
</script>
</body>
</html>

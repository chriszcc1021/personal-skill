<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>Muscle Fund · Base Avatar</title>
<style>
  :root { --ink:#1a1a1a; --skin:#f4c79a; --paper:#f7f1e3; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: ui-sans-serif, system-ui, "PingFang SC", sans-serif;
         background: var(--paper); color: var(--ink); }
  .wrap { max-width: 980px; margin: 0 auto; padding: 24px;
          display: grid; grid-template-columns: 360px 1fr; gap: 24px; }
  h1 { font-size: 18px; margin: 0 0 16px; letter-spacing: 1px; }
  .stage { background:#fff; border:2px solid var(--ink); border-radius:14px;
           aspect-ratio: 1/1; display:flex; align-items:center; justify-content:center; }
  .stage svg { width: 92%; height: 92%; }
  .panel { display: grid; gap: 14px; }
  .row { background:#fff; border:2px solid var(--ink); border-radius:12px; padding:10px 12px; }
  .row > label { font-size: 12px; font-weight: 700; letter-spacing: .5px;
                 text-transform: uppercase; opacity:.7; display:block; margin-bottom:8px; }
  .opts { display:flex; flex-wrap:wrap; gap:6px; }
  .opt { border:1.5px solid var(--ink); background:#fff; padding:6px 10px;
         border-radius:8px; cursor:pointer; font-size:13px; }
  .opt.active { background: var(--ink); color:#fff; }
  @media (max-width: 760px) { .wrap { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <!-- doodle base character. viewBox 200x260, all strokes black, fills minimal -->
    <svg id="avatar" viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg"
         fill="none" stroke="#1a1a1a" stroke-width="2.4"
         stroke-linecap="round" stroke-linejoin="round">

      <!-- LEGS (behind shorts) -->
      <g id="legs">
        <path d="M82 198 L78 250" />
        <path d="M118 198 L122 250" />
        <path d="M70 250 L88 250" />
        <path d="M112 250 L130 250" />
      </g>

      <!-- SHORTS layer (replaced by JS) -->
      <g id="layer-shorts"></g>

      <!-- TORSO: shirtless doodle with simple chest + ab lines -->
      <g id="torso">
        <path d="M70 120 Q70 100 100 100 Q130 100 130 120 L130 198 L70 198 Z" fill="#f4c79a"/>
        <!-- collarbone -->
        <path d="M78 115 Q100 122 122 115" />
        <!-- chest divide -->
        <path d="M100 122 L100 150" />
        <!-- pec curves -->
        <path d="M78 122 Q90 142 100 150" />
        <path d="M122 122 Q110 142 100 150" />
        <!-- ab lines -->
        <path d="M100 150 L100 188" />
        <path d="M88 158 L112 158" />
        <path d="M86 170 L114 170" />
        <path d="M86 182 L114 182" />
      </g>

      <!-- ARMS -->
      <g id="arms">
        <path d="M70 122 Q56 150 60 188" fill="#f4c79a"/>
        <path d="M130 122 Q144 150 140 188" fill="#f4c79a"/>
        <circle cx="58" cy="192" r="6" fill="#f4c79a"/>
        <circle cx="142" cy="192" r="6" fill="#f4c79a"/>
      </g>

      <!-- NECK -->
      <path d="M92 90 L92 102 M108 90 L108 102" />

      <!-- HEAD -->
      <g id="head">
        <ellipse cx="100" cy="62" rx="32" ry="34" fill="#f4c79a"/>
        <!-- ears -->
        <path d="M68 62 Q62 64 64 72" fill="#f4c79a"/>
        <path d="M132 62 Q138 64 136 72" fill="#f4c79a"/>
        <!-- eyes (base) -->
        <circle cx="88" cy="62" r="2" fill="#1a1a1a" stroke="none"/>
        <circle cx="112" cy="62" r="2" fill="#1a1a1a" stroke="none"/>
        <!-- eyebrows -->
        <path d="M82 54 L94 54" />
        <path d="M106 54 L118 54" />
      </g>

      <!-- NOSE layer -->
      <g id="layer-nose"></g>

      <!-- MOUTH layer -->
      <g id="layer-mouth"></g>

      <!-- HAIR layer (on top of head) -->
      <g id="layer-hair"></g>

      <!-- GLASSES layer (top) -->
      <g id="layer-glasses"></g>
    </svg>
  </div>

  <div class="panel">
    <h1>Muscle Fund · 进站形象</h1>

    <div class="row" data-group="gender">
      <label>性别</label>
      <div class="opts"></div>
    </div>
    <div class="row" data-group="hair">
      <label>发型</label>
      <div class="opts"></div>
    </div>
    <div class="row" data-group="glasses">
      <label>眼镜</label>
      <div class="opts"></div>
    </div>
    <div class="row" data-group="nose">
      <label>鼻子</label>
      <div class="opts"></div>
    </div>
    <div class="row" data-group="mouth">
      <label>嘴巴</label>
      <div class="opts"></div>
    </div>
    <div class="row" data-group="shorts">
      <label>短裤样式</label>
      <div class="opts"></div>
    </div>
  </div>
</div>

<script>
// ---- doodle parts. All strokes inherit from parent svg (stroke=#1a1a1a). ----
// Coordinate anchors:
//  head center  (100,62), head r ~32x34
//  nose         (100,68)
//  mouth        (100,80)
//  shorts band  y=198..230 across torso width 70..130

const HAIR = {
  // male set
  bald:   ``,
  buzz:   `<path d="M70 50 Q100 26 130 50" />
           <path d="M74 48 L74 44 M82 44 L82 40 M90 42 L90 38 M100 40 L100 36
                    M110 42 L110 38 M118 44 L118 40 M126 48 L126 44"
                 stroke-width="1.6"/>`,
  medium: `<path d="M68 56 Q70 28 100 28 Q130 28 132 56 Q126 44 116 44
                    Q110 34 100 36 Q90 34 84 44 Q74 44 68 56 Z" fill="#1a1a1a"/>`,
  long:   `<path d="M66 70 Q60 30 100 26 Q140 30 134 70 L130 66 Q132 44 100 38
                    Q68 44 70 66 Z" fill="#1a1a1a"/>`,
  // female set
  short_f:  `<path d="M66 60 Q66 28 100 28 Q134 28 134 60 Q128 50 118 48
                      Q108 38 100 40 Q92 38 82 48 Q72 50 66 60 Z" fill="#1a1a1a"/>
             <path d="M72 60 Q70 74 78 78" fill="#1a1a1a"/>
             <path d="M128 60 Q130 74 122 78" fill="#1a1a1a"/>`,
  ponytail: `<path d="M68 56 Q70 26 100 26 Q130 26 132 56 Q120 44 100 44
                      Q80 44 68 56 Z" fill="#1a1a1a"/>
             <path d="M130 50 Q150 70 142 100 Q138 80 128 70" fill="#1a1a1a"/>`,
  twin_braid:`<path d="M68 56 Q70 26 100 26 Q130 26 132 56 Q118 46 100 46
                      Q82 46 68 56 Z" fill="#1a1a1a"/>
             <path d="M66 72 Q56 92 60 112 Q72 100 70 80 Z" fill="#1a1a1a"/>
             <path d="M134 72 Q144 92 140 112 Q128 100 130 80 Z" fill="#1a1a1a"/>
             <circle cx="60" cy="112" r="3" fill="#1a1a1a" stroke="none"/>
             <circle cx="140" cy="112" r="3" fill="#1a1a1a" stroke="none"/>`,
  long_curl: `<path d="M62 60 Q60 24 100 24 Q140 24 138 60
                      Q142 100 132 130 Q126 110 130 84
                      Q118 50 100 46 Q82 50 70 84
                      Q74 110 68 130 Q58 100 62 60 Z" fill="#1a1a1a"/>
             <path d="M68 110 q-4 8 0 16 M132 110 q4 8 0 16" stroke="#fff" stroke-width="1.6"/>`,
};

const GLASSES = {
  none:   ``,
  round:  `<circle cx="88" cy="62" r="7" />
           <circle cx="112" cy="62" r="7" />
           <path d="M95 62 L105 62" />`,
  square: `<rect x="80" y="55" width="16" height="14" rx="2" />
           <rect x="104" y="55" width="16" height="14" rx="2" />
           <path d="M96 62 L104 62" />`,
  shades: `<rect x="80" y="55" width="16" height="12" rx="2" fill="#1a1a1a"/>
           <rect x="104" y="55" width="16" height="12" rx="2" fill="#1a1a1a"/>
           <path d="M96 61 L104 61" />`,
};

const NOSE = {
  small_round: `<circle cx="100" cy="72" r="2.4" />`,
  triangle:    `<path d="M100 64 L94 76 L106 76 Z" />`,
  big:         `<path d="M96 64 Q92 76 100 78 Q108 76 104 64" />
                <circle cx="97" cy="76" r="1.2" fill="#1a1a1a" stroke="none"/>
                <circle cx="103" cy="76" r="1.2" fill="#1a1a1a" stroke="none"/>`,
};

const MOUTH = {
  smile:       `<path d="M90 84 Q100 92 110 84" />`,
  laugh_teeth: `<path d="M88 82 Q100 96 112 82 Z" fill="#fff"/>
                <path d="M92 86 L108 86" />
                <path d="M96 82 L96 90 M100 82 L100 90 M104 82 L104 90" stroke-width="1.4"/>`,
  pursed:      `<path d="M94 86 L106 86" />`,
  tongue:      `<path d="M90 82 Q100 92 110 82" />
                <path d="M96 88 Q100 96 104 88 Z" fill="#e76f51"/>`,
};

const SHORTS = {
  classic:  `<path d="M68 198 L132 198 L130 230 L102 230 L100 210 L98 230 L70 230 Z"
                   fill="#2b6cb0"/>
             <path d="M68 204 L132 204" />`,
  tight:    `<path d="M70 198 L130 198 L128 244 L102 244 L100 210 L98 244 L72 244 Z"
                   fill="#1a1a1a"/>`,
  fifth:    `<path d="M68 198 L132 198 L132 250 L102 250 L100 210 L98 250 L68 250 Z"
                   fill="#777"/>
             <path d="M68 206 L132 206" />`,
  beach:    `<path d="M66 198 L134 198 L132 234 L102 234 L100 210 L98 234 L68 234 Z"
                   fill="#ffd166"/>
             <path d="M72 210 q4 6 8 0 M86 218 q4 6 8 0 M104 212 q4 6 8 0
                      M118 220 q4 6 8 0" stroke="#e76f51"/>`,
};

// ---- option catalog ----
const GROUPS = {
  gender:  [['male','男'], ['female','女']],
  // hair list is rebuilt per gender (see refreshHair)
  hair:    [],
  glasses: [['none','无眼镜'], ['round','圆框'], ['square','方框'], ['shades','墨镜']],
  nose:    [['small_round','小圆鼻'], ['triangle','三角鼻'], ['big','大鼻']],
  mouth:   [['smile','微笑'], ['laugh_teeth','大笑露牙'], ['pursed','抿嘴'], ['tongue','吐舌']],
  shorts:  [['classic','经典运动短裤'], ['tight','紧身裤'], ['fifth','五分裤'], ['beach','沙滩花裤']],
};

const HAIR_MALE = [['bald','光头'], ['buzz','寸头'], ['medium','中长'], ['long','长发']];
const HAIR_FEMALE = [['short_f','短发'], ['ponytail','马尾'], ['twin_braid','双麻花'], ['long_curl','长卷']];

const state = {
  gender: 'male',
  hair: 'buzz',
  glasses: 'none',
  nose: 'small_round',
  mouth: 'smile',
  shorts: 'classic',
};

const LAYER_MAP = {
  hair:    [HAIR, 'layer-hair'],
  glasses: [GLASSES, 'layer-glasses'],
  nose:    [NOSE, 'layer-nose'],
  mouth:   [MOUTH, 'layer-mouth'],
  shorts:  [SHORTS, 'layer-shorts'],
};

function render() {
  for (const k of Object.keys(LAYER_MAP)) {
    const [table, layerId] = LAYER_MAP[k];
    const svgFrag = table[state[k]] ?? '';
    document.getElementById(layerId).innerHTML = svgFrag;
  }
}

function refreshHair() {
  GROUPS.hair = state.gender === 'female' ? HAIR_FEMALE : HAIR_MALE;
  // if current hair key not in new set, fall back to first
  const keys = GROUPS.hair.map(o => o[0]);
  if (!keys.includes(state.hair)) state.hair = keys[0];
  buildRow('hair');
}

function buildRow(group) {
  const row = document.querySelector(`.row[data-group="${group}"] .opts`);
  row.innerHTML = '';
  for (const [key, label] of GROUPS[group]) {
    const btn = document.createElement('button');
    btn.className = 'opt' + (state[group] === key ? ' active' : '');
    btn.textContent = label;
    btn.onclick = () => {
      state[group] = key;
      if (group === 'gender') refreshHair();
      buildRow(group);
      render();
    };
    row.appendChild(btn);
  }
}

// init
refreshHair();
for (const g of ['gender','glasses','nose','mouth','shorts']) buildRow(g);
render();
</script>
</body>
</html>

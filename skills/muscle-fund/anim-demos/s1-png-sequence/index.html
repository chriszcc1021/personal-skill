<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>方案 1 · PNG 序列帧</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root{--sand:#F4E4BC;--ink:#0D3B4F;}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;font-family:"PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink)}
  body{display:flex;flex-direction:column;align-items:center;justify-content:center;
       background:radial-gradient(ellipse at 50% 60%, #fff5d6 0%, var(--sand) 60%, #e6cf94 100%);}
  h1{font-size:22px;margin-bottom:6px;letter-spacing:.05em}
  .sub{opacity:.6;font-size:13px;margin-bottom:10px}

  .stage{position:relative;width:min(560px,92vw);aspect-ratio:1/1;
         border-radius:24px;overflow:hidden;background:#fff;
         box-shadow:0 12px 28px rgba(13,59,79,.22);}
  .sprite{position:absolute;inset:0;width:100%;height:100%;
          display:flex;}
  /* 关键：6 帧并排 → 用 steps() 一次跳一帧 */
  .strip{display:flex;width:600%;height:100%;
         animation:cycle 1.2s steps(6) infinite;}
  .strip img{width:16.6667%;height:100%;object-fit:contain;display:block;
             image-rendering:auto;}
  @keyframes cycle{
    from{transform:translateX(0)}
    to  {transform:translateX(-100%)}
  }
  /* 上下顺序：1,2,3,4,5,6 (上升 4 帧 + 下降 2 帧) */

  .bubbles{position:absolute;inset:0;pointer-events:none}
  .bubble{position:absolute;bottom:-30px;border-radius:50%;
          background:rgba(79,195,247,.45);border:1px solid rgba(13,59,79,.18);
          animation:rise linear infinite}
  @keyframes rise{0%{transform:translateY(0);opacity:0}10%{opacity:.85}90%{opacity:.85}100%{transform:translateY(-110vh);opacity:0}}

  .meta{margin-top:14px;font-size:12px;opacity:.6;text-align:center;max-width:560px;line-height:1.6;padding:0 12px}
  .ctrl{margin-top:10px;display:flex;gap:8px}
  button{padding:6px 14px;border:1.5px solid var(--ink);background:#fff;border-radius:20px;font-size:12px;cursor:pointer;color:var(--ink);font-family:inherit}
  button:hover{background:var(--ink);color:#fff}
</style>
</head>
<body>
  <h1>海绵宝宝风格鱼 · 举哑铃</h1>
  <div class="sub">方案 1 — 6 帧 PNG 序列帧（OpenAI gpt-image-2 生成）</div>
  <div class="stage">
    <div class="bubbles" id="bubbles"></div>
    <div class="sprite">
      <div class="strip" id="strip">
        <img src="frame-1.png" alt="">
        <img src="frame-2.png" alt="">
        <img src="frame-3.png" alt="">
        <img src="frame-4.png" alt="">
        <img src="frame-5.png" alt="">
        <img src="frame-6.png" alt="">
      </div>
    </div>
  </div>
  <div class="ctrl">
    <button onclick="setSpeed(1.8)">慢速</button>
    <button onclick="setSpeed(1.2)">正常</button>
    <button onclick="setSpeed(0.7)">快速</button>
  </div>
  <div class="meta">每帧 200ms · 6 帧 · 总周期 1.2s · CSS steps(6) 离散跳跃<br>缺陷：AI 生成姿势同源但脸/比例有微小 drift（瞳孔大小、嘴角角度）</div>

<script>
  const bub = document.getElementById('bubbles');
  for(let i=0;i<14;i++){
    const b=document.createElement('div'); b.className='bubble';
    const s=6+Math.random()*22; b.style.width=s+'px'; b.style.height=s+'px';
    b.style.left=(Math.random()*100)+'%';
    b.style.animationDuration=(6+Math.random()*8)+'s';
    b.style.animationDelay=(Math.random()*8)+'s';
    bub.appendChild(b);
  }
  function setSpeed(s){
    document.getElementById('strip').style.animationDuration = s+'s';
  }
</script>
</body>
</html>
